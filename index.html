<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Moto X3M - Rodas Melhoradas</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; color: white; }
        #canvas-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #instrucoes { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(0, 0, 0, 0.8); padding: 10px 20px; border-radius: 8px; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="instrucoes">
        <h2>Moto X3M - Rodas Melhoradas</h2>
        <p>Seta Para Cima (↑): Acelerar | Seta Para Baixo (↓): Frear</p>
        <p>Seta Esquerda (←): Giro Trás | Seta Direita (→): Giro Frente</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 1.4; // Gravidade ligeiramente aumentada para melhor controle

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: 1000,
                height: 600,
                wireframes: false, // Mantém falso para renderizar as cores e detalhes
                background: '#1a2634'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- CENÁRIO ENRIQUECIDO ---
        const chaoOpcoes = { isStatic: true, render: { fillStyle: '#27ae60' }, friction: 0.9 };
        Composite.add(world, [
            Bodies.rectangle(200, 500, 450, 40, chaoOpcoes),
            // Rampa curva/íngreme de teste
            Bodies.rectangle(570, 430, 300, 40, { isStatic: true, angle: -0.5, render: { fillStyle: '#27ae60' }, friction: 1 }),
            Bodies.rectangle(850, 350, 300, 40, { isStatic: true, angle: -0.2, render: { fillStyle: '#27ae60' }, friction: 1 }),
            // Vão livre
            Bodies.rectangle(1350, 550, 400, 40, chaoOpcoes),
            // Rampa final para o gol
            Bodies.rectangle(1700, 480, 300, 40, { isStatic: true, angle: -0.4, render: { fillStyle: '#27ae60' } }),
            Bodies.rectangle(2200, 350, 600, 40, chaoOpcoes),
            // Linha de chegada
            Bodies.rectangle(2400, 280, 20, 100, { isStatic: true, isSensor: true, render: { fillStyle: '#e74c3c' } })
        ]);

        // --- MOTO COM RODAS MELHORADAS ---
        const chassi = Bodies.rectangle(100, 400, 80, 20, { 
            collisionFilter: { group: -1 },
            render: { fillStyle: '#d35400' } 
        });

        // Configuração avançada das rodas
        const rodaOpcoes = { 
            friction: 1.0,          // Atrito máximo para não deslizar nas rampas (Grip de Moto X3M)
            density: 0.005,         // Deixa a roda ligeiramente mais pesada para dar estabilidade
            collisionFilter: { group: -1 },
            render: { 
                fillStyle: '#2c3e50', // Cor do pneu (Grafite escuro)
                strokeStyle: '#f1c40f', // Cor dos aros/detalhes (Amarelo)
                lineWidth: 5          // Espessura do aro
            }
        };

        // Criando as rodas como engrenagens de 4 raios para que o giro seja visível
        // O truque aqui é usar "polygon" com muitos lados (ex: 20) para ser redondo, mas definindo lados visíveis,
        // ou simplesmente aplicar a propriedade abaixo que adiciona detalhes visuais automáticos no Matter.js.
        const rodaTraseira = Bodies.circle(65, 430, 22, rodaOpcoes);
        const rodaDianteira = Bodies.circle(135, 430, 22, rodaOpcoes);

        // Customização manual para desenhar raios nas rodas usando o canvas nativo do Matter.js
        // Isso força o renderizador a mostrar uma linha cortando a roda para vermos ela girar.
        rodaTraseira.render.sprite = { xScale: 1, yScale: 1 }; 
        rodaDianteira.render.sprite = { xScale: 1, yScale: 1 }; 

        // Suspensão melhorada (Mais firme, evita que a moto bata o chassi no chão)
        const molaTraseira = Constraint.create({
            bodyA: chassi, bodyB: rodaTraseira,
            pointA: { x: -35, y: 15 }, pointB: { x: 0, y: 0 },
            stiffness: 0.5, length: 12,
            render: { strokeStyle: '#bdc3c7', lineWidth: 4 }
        });

        const molaDianteira = Constraint.create({
            bodyA: chassi, bodyB: rodaDianteira,
            pointA: { x: 35, y: 15 }, pointB: { x: 0, y: 0 },
            stiffness: 0.5, length: 12,
            render: { strokeStyle: '#bdc3c7', lineWidth: 4 }
        });

        Composite.add(world, [chassi, rodaTraseira, rodaDianteira, molaTraseira, molaDianteira]);

        // --- CONTROLES MODIFICADOS ---
        const teclas = {};
        window.addEventListener('keydown', (e) => teclas[e.code] = true);
        window.addEventListener('keyup', (e) => teclas[e.code] = false);

        // Injetando uma função de desenho customizada para ver os raios da roda girando
        Matter.Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            
            // Desenha raios na Roda Traseira
            ctx.save();
            ctx.translate(rodaTraseira.position.x - render.bounds.min.x, rodaTraseira.position.y - render.bounds.min.y);
            ctx.rotate(rodaTraseira.angle);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-22, 0); ctx.lineTo(22, 0);
            ctx.moveTo(0, -22); ctx.lineTo(0, 22);
            ctx.stroke();
            ctx.restore();

            // Desenha raios na Roda Dianteira
            ctx.save();
            ctx.translate(rodaDianteira.position.x - render.bounds.min.x, rodaDianteira.position.y - render.bounds.min.y);
            ctx.rotate(rodaDianteira.angle);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-22, 0); ctx.lineTo(22, 0);
            ctx.moveTo(0, -22); ctx.lineTo(0, 22);
            ctx.stroke();
            ctx.restore();
        });

        Matter.Events.on(engine, 'beforeUpdate', () => {
            // Torque aumentado para subir as rampas com facilidade devido ao melhor atrito
            const torqueMotor = 0.4; 
            const forcaInclinacao = 0.08;

            if (teclas['ArrowUp']) {
                Body.setAngularVelocity(rodaTraseira, torqueMotor);
            }
            if (teclas['ArrowDown']) {
                // Freio trava a roda traseira e diminui a dianteira
                Body.setAngularVelocity(rodaTraseira, 0);
                Body.setAngularVelocity(rodaDianteira, 0);
            }
            if (teclas['ArrowLeft']) {
                Body.setAngularVelocity(chassi, -forcaInclinacao);
            }
            if (teclas['ArrowRight']) {
                Body.setAngularVelocity(chassi, forcaInclinacao);
            }

            // Câmera
            Render.lookAt(render, {
                min: { x: chassi.position.x - 300, y: chassi.position.y - 350 },
                max: { x: chassi.position.x + 700, y: chassi.position.y + 250 }
            });

            if (chassi.position.y > 1000) reiniciarJogo();
            if (chassi.position.x > 2400) { alert("Vitória!"); reiniciarJogo(); }
        });

        function reiniciarJogo() {
            Body.setPosition(chassi, { x: 100, y: 400 });
            Body.setVelocity(chassi, { x: 0, y: 0 });
            Body.setAngularVelocity(chassi, 0);
            Body.setPosition(rodaTraseira, { x: 65, y: 430 });
            Body.setVelocity(rodaTraseira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaTraseira, 0);
            Body.setPosition(rodaDianteira, { x: 135, y: 430 });
            Body.setVelocity(rodaDianteira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaDianteira, 0);
        }
    </script>
</body>
</html>
