<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner - Premium</title>
  <style>
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #0a0a0a; font-family: 'Arial', sans-serif;
      overflow: hidden; user-select: none;
    }
    canvas {
      border: 8px solid #1a1a1a;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(0, 255, 140, 0.7);
    }
    #hud { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); color: white; text-align: center; text-shadow: 0 3px 15px black; z-index: 10; pointer-events: none; }
    #score { font-size: 42px; font-weight: bold; letter-spacing: 3px; }
    #level { font-size: 24px; color: #ffd700; margin-top: 4px; text-shadow: 0 0 10px gold; }
    #highscore { font-size: 17px; color: #ccc; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="hud">
    <div>Distância: <span id="score">0</span>m</div>
    <div id="level">Nível 1</div>
    <div id="highscore">Recorde: 0m</div>
  </div>
  <canvas id="gameCanvas" width="950" height="520"></canvas>

  <div id="restart" style="display:none;">
    <h2>GAME OVER</h2>
    <p>Distância: <span id="finalScore">0</span>m</p>
    <p>Nível: <span id="finalLevel">1</span></p>
    <button onclick="restartGame()" style="padding:16px 45px; font-size:20px; margin-top:20px; cursor:pointer; border:none; border-radius:12px; background:#e63939; color:white;">
      Jogar Novamente (R)
    </button>
  </div>
  <div id="pauseScreen" style="display:none;">
    <h2>PAUSADO</h2>
    <p>Pressione P para continuar</p>
  </div>

  <p style="position:absolute;bottom:18px;color:#bbb;text-align:center;width:100%;font-size:15px;">
    ← → : Acelerar/Desacelerar | ESPAÇO ou ↑ : Pular | P : Pausar
  </p>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const highscoreEl = document.getElementById("highscore");
    const restartScreen = document.getElementById("restart");
    const pauseScreen = document.getElementById("pauseScreen");
    const finalScoreEl = document.getElementById("finalScore");
    const finalLevelEl = document.getElementById("finalLevel");

    let gameState = {
      bikeX: 130, bikeY: 355, bikeSpeed: 7, velocityY: 0, gravity: 0.85,
      isJumping: false, score: 0, highScore: localStorage.getItem("motoHighScore") || 0,
      gameTime: 0, level: 1, gameOver: false, paused: false,
      timeOfDay: 0, wheelAngle: 0, cloudOffset: 0, lastObstacleTime: Date.now(),
      shake: 0
    };

    let obstacles = [], particles = [], exhaustTrails = [], keys = {};
    let lastTime = 0;

    highscoreEl.textContent = `Recorde: ${gameState.highScore}m`;

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    // Parallax Layers
    const parallaxLayers = [
      { speed: 0.2,  color: "#1a2f2a", y: 180 },   // Montanhas distantes
      { speed: 0.5,  color: "#234d3a", y: 250 },   // Colinas
      { speed: 0.9,  color: "#2a6b4a", y: 310 }    // Grama distante
    ];

    function createGroundParticles(x, y) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: x + 25 + Math.random() * 25,
          y: y + 48,
          vx: -gameState.bikeSpeed * 0.65 - Math.random() * 5,
          vy: -Math.random() * 4 - 1,
          life: 35,
          size: Math.random() * 8 + 4,
          color: "#888"
        });
      }
    }

    function createExhaust(x, y) {
      const intensity = Math.max(0, (gameState.bikeSpeed - 12) / 16);
      for (let i = 0; i < 7 + intensity * 7; i++) {
        exhaustTrails.push({
          x: x + Math.random() * 12 - 6,
          y: y + Math.random() * 9 - 4,
          vx: -gameState.bikeSpeed * 0.8 - Math.random() * 10,
          vy: -Math.random() * 6 - 2,
          life: 26 + intensity * 20,
          size: 9 + intensity * 12,
          hue: 15 + Math.random() * 45
        });
      }
    }

    function drawBackground() {
      const t = gameState.timeOfDay;

      // Céu aprimorado
      const sky = ctx.createLinearGradient(0, 0, 0, 380);
      sky.addColorStop(0, `rgb(${Math.floor(8+45*(1-t))},${Math.floor(55-60*t)},${Math.floor(130-95*t)})`);
      sky.addColorStop(1, t > 0.7 ? "#0a0a2b" : "#8ed1ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, 380);

      // Estrelas à noite
      if (t > 0.6) {
        ctx.fillStyle = "white";
        for (let i = 0; i < 45; i++) {
          let x = (i * 37 + gameState.gameTime * 0.1) % canvas.width;
          let y = 40 + (i % 12) * 18;
          ctx.globalAlpha = 0.6 + Math.sin(gameState.gameTime * 0.01 + i) * 0.4;
          ctx.fillRect(x, y, 1.5, 1.5);
        }
        ctx.globalAlpha = 1;
      }

      // Sol / Lua
      if (t < 0.65) {
        ctx.fillStyle = `rgba(255, 245, 120, ${1-t})`;
        ctx.beginPath(); ctx.arc(720, 95, 55, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = `rgba(240, 245, 255, ${t-0.6})`;
        ctx.beginPath(); ctx.arc(765, 88, 42, 0, Math.PI*2); ctx.fill();
      }

      // Nuvens suaves
      gameState.cloudOffset = (gameState.cloudOffset + 0.35) % (canvas.width + 500);
      ctx.fillStyle = `rgba(255,255,255,${0.75 - t*0.65})`;
      for (let i = 0; i < 5; i++) {
        let x = (i*240 + gameState.cloudOffset) % (canvas.width + 500) - 80;
        ctx.beginPath(); ctx.ellipse(x+80, 65+i*22, 72, 32, 0, 0, Math.PI*2); ctx.fill();
      }

      // Parallax
      for (let layer of parallaxLayers) {
        const offset = (gameState.score * layer.speed) % (canvas.width * 2.2);
        ctx.fillStyle = layer.color;
        ctx.fillRect(0, layer.y, canvas.width, 180);

        ctx.fillStyle = t > 0.55 ? "#0c1f1a" : "#1f4a36";
        for (let i = -1; i < 6; i++) {
          let x = i * 210 - offset;
          ctx.beginPath();
          ctx.moveTo(x, layer.y + 55);
          ctx.lineTo(x + 95, layer.y - 30);
          ctx.lineTo(x + 195, layer.y + 55);
          ctx.fill();
        }
      }

      // Grama lateral
      ctx.fillStyle = "#1e3f2b";
      ctx.fillRect(0, 370, canvas.width, 30);
      ctx.fillStyle = "#2a5a3f";
      ctx.fillRect(0, 385, canvas.width, 15);

      // Estrada premium
      const road = ctx.createLinearGradient(0,380,0,520);
      road.addColorStop(0, t > 0.6 ? "#1c1c1c" : "#2f2f2f");
      road.addColorStop(1, "#0a0a0a");
      ctx.fillStyle = road;
      ctx.fillRect(0,380,canvas.width,140);

      // Linhas da estrada com brilho
      ctx.strokeStyle = "#ffeb3b";
      ctx.lineWidth = 12;
      const blur = Math.min(gameState.bikeSpeed / 18, 2);
      for (let i = -150; i < canvas.width + 200; i += 82) {
        let pos = i - (gameState.score * 3.8 % 82);
        ctx.globalAlpha = 0.9 - blur * 0.3;
        ctx.shadowBlur = 8;
        ctx.shadowColor = "#ffee77";
        ctx.beginPath();
        ctx.moveTo(pos, 427);
        ctx.lineTo(pos + 52, 427);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    function drawBike() {
      const x = gameState.bikeX;
      const y = gameState.bikeY;
      const lean = Math.min((gameState.bikeSpeed - 14) * 1.1, 22);
      const bob = gameState.isJumping ? Math.sin(gameState.gameTime * 0.25) * 6 : 0;
      const shakeX = (Math.random() - 0.5) * gameState.shake;
      const shakeY = (Math.random() - 0.5) * gameState.shake * 0.6;

      gameState.wheelAngle += gameState.bikeSpeed * 0.2;

      // Sombra
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(x + 10 + shakeX, y + 54 + shakeY, 102, 18);

      // === PILOTO ===
      ctx.save();
      ctx.translate(x + 70 + shakeX, y + 16 + bob + shakeY);
      ctx.rotate(-lean * 0.018);

      ctx.fillStyle = "#1f1f1f";           // Jaqueta
      ctx.fillRect(-8, 4, 36, 42);
      ctx.fillStyle = "#0f0f0f";           // Capacete
      ctx.beginPath();
      ctx.ellipse(16, -9, 19, 17, 0.25, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#ff1a1a";           // Detalhe capacete
      ctx.fillRect(24, -15, 11, 9);

      ctx.restore();

      // === MOTO DETALHADA ===
      const grad = ctx.createLinearGradient(x+22, y+12, x+115, y+52);
      grad.addColorStop(0, "#ff2d2d");
      grad.addColorStop(1, "#b81a1a");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x+24, y+19);
      ctx.quadraticCurveTo(x+52, y+8, x+85, y+16);
      ctx.lineTo(x+112, y+44);
      ctx.lineTo(x+40, y+55);
      ctx.lineTo(x+21, y+31);
      ctx.closePath();
      ctx.fill();

      // Cromados e detalhes
      ctx.fillStyle = "#eeeeee";
      ctx.fillRect(x+46, y+18, 48, 11);
      ctx.fillStyle = "#444";
      ctx.fillRect(x+38, y+44, 58, 16);

      // Retrovisores
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x+95, y+18);
      ctx.lineTo(x+112, y+8);
      ctx.stroke();

      // Escapamento duplo
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 11;
      ctx.beginPath(); ctx.moveTo(x+41, y+51); ctx.quadraticCurveTo(x+14, y+55, x+6, y+67); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+50, y+52); ctx.quadraticCurveTo(x+22, y+59, x+14, y+73); ctx.stroke();

      if (gameState.bikeSpeed > 13) createExhaust(x + 9, y + 65);

      // Rodas
      ctx.strokeStyle = "#0a0a0a"; ctx.lineWidth = 28;
      ctx.beginPath(); ctx.arc(x+38, y+54, 21, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+98, y+54, 21, 0, Math.PI*2); ctx.stroke();

      ctx.strokeStyle = "#ddd"; ctx.lineWidth = 10;
      ctx.save(); ctx.translate(x+38, y+54); ctx.rotate(gameState.wheelAngle);
      ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.stroke(); ctx.restore();
      ctx.save(); ctx.translate(x+98, y+54); ctx.rotate(gameState.wheelAngle);
      ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.stroke(); ctx.restore();

      // Farol com brilho
      ctx.fillStyle = "#ffeebb";
      ctx.beginPath(); ctx.ellipse(x+115, y+26, 17, 14, -0.6, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 25;
      ctx.shadowColor = "#ffee88";
      ctx.fillStyle = "rgba(255,240,180,0.6)";
      ctx.beginPath(); ctx.ellipse(x+118, y+26, 22, 12, -0.6, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // (As funções drawParticles, drawExhaustTrails, drawObstacle, update, draw, etc. permanecem iguais às da versão anterior)

    // ... [Para não estender demais, use as funções update, draw, gameLoop, endGame e restartGame da versão anterior que enviei]

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
