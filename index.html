<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      border: 5px solid #222;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 255, 100, 0.4);
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      text-align: center;
      text-shadow: 0 2px 10px black;
    }
    #score { font-size: 28px; font-weight: bold; }
    #level { font-size: 18px; color: #ffd700; }
  </style>
</head>
<body>
  <div id="hud">
    <div>Distância: <span id="score">0</span>m</div>
    <div id="level">Nível 1</div>
  </div>
  <canvas id="gameCanvas" width="900" height="500"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");

    let bikeX = 120;
    let bikeY = 340;
    let bikeSpeed = 7;
    let velocityY = 0;
    let gravity = 0.85;
    let isJumping = false;
    let score = 0;
    let gameTime = 0;
    let level = 1;
    let gameOver = false;
    let wheelAngle = 0;

    let obstacles = [];
    let particles = [];
    let lastObstacle = 0;

    let keys = {};

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    // Partículas de poeira
    function createParticles(x, y) {
      for (let i = 0; i < 6; i++) {
        particles.push({
          x: x + 10,
          y: y + 35,
          vx: -bikeSpeed * 0.3 - Math.random() * 3,
          vy: -1 - Math.random() * 2,
          life: 25
        });
      }
    }

    function drawBackground() {
      // Céu gradiente
      const grad = ctx.createLinearGradient(0, 0, 0, 300);
      grad.addColorStop(0, "#1e90ff");
      grad.addColorStop(1, "#87ceeb");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, 380);

      // Sol
      ctx.fillStyle = "#ffeb3b";
      ctx.beginPath();
      ctx.arc(700, 120, 45, 0, Math.PI * 2);
      ctx.fill();

      // Montanhas
      ctx.fillStyle = "#2e8b57";
      ctx.beginPath();
      ctx.moveTo(0, 380);
      ctx.lineTo(200, 180);
      ctx.lineTo(450, 380);
      ctx.lineTo(650, 220);
      ctx.lineTo(900, 380);
      ctx.fill();

      // Estrada
      ctx.fillStyle = "#333";
      ctx.fillRect(0, 380, canvas.width, 120);

      // Grama
      ctx.fillStyle = "#1e5c1e";
      ctx.fillRect(0, 370, canvas.width, 15);

      // Linhas da estrada
      ctx.strokeStyle = "#ffeb3b";
      ctx.lineWidth = 8;
      for (let i = -50; i < canvas.width + 50; i += 80) {
        let pos = (i - (score * 2 % 80));
        ctx.beginPath();
        ctx.moveTo(pos, 415);
        ctx.lineTo(pos + 45, 415);
        ctx.stroke();
      }
    }

    function drawBike() {
      wheelAngle += bikeSpeed * 0.12;

      // Sombra
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.fillRect(bikeX + 15, bikeY + 45, 65, 12);

      // Corpo da moto
      ctx.fillStyle = "#e63939";
      ctx.fillRect(bikeX + 10, bikeY + 10, 75, 28);

      // Detalhes cromados
      ctx.fillStyle = "#ddd";
      ctx.fillRect(bikeX + 20, bikeY + 18, 55, 8);

      // Rodas
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.arc(bikeX + 20, bikeY + 45, 18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(bikeX + 75, bikeY + 45, 18, 0, Math.PI * 2);
      ctx.stroke();

      // Aros das rodas
      ctx.strokeStyle = "#ddd";
      ctx.lineWidth = 6;
      ctx.save();
      ctx.translate(bikeX + 20, bikeY + 45);
      ctx.rotate(wheelAngle);
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(bikeX + 75, bikeY + 45);
      ctx.rotate(wheelAngle * 0.9);
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Guidão
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(bikeX + 65, bikeY + 18);
      ctx.quadraticCurveTo(bikeX + 85, bikeY + 5, bikeX + 95, bikeY - 8);
      ctx.stroke();

      // Piloto
      ctx.fillStyle = "#222";
      ctx.fillRect(bikeX + 35, bikeY - 18, 28, 25); // corpo
      ctx.fillStyle = "#ffdbac";
      ctx.fillRect(bikeX + 42, bikeY - 28, 18, 18); // cabeça

      // Capacete
      ctx.fillStyle = "#111";
      ctx.fillRect(bikeX + 40, bikeY - 32, 22, 12);
    }

    function drawObstacles() {
      for (let obs of obstacles) {
        ctx.fillStyle = "#5d4037";
        ctx.fillRect(obs.x, obs.y, 48, 55);
        
        ctx.fillStyle = "#3e2723";
        ctx.fillRect(obs.x + 8, obs.y + 8, 32, 15);
      }
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.fillStyle = `rgba(180,180,180,${p.life/25})`;
        ctx.fillRect(p.x, p.y, 6, 6);
        
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vy += 0.2;
        
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function update() {
      if (gameOver) return;

      gameTime++;

      // Aumento automático de velocidade
      if (gameTime % 280 === 0) {
        bikeSpeed += 0.45;
        level = Math.floor(bikeSpeed / 3.5) + 1;
        levelEl.textContent = `Nível ${level}`;
      }
      if (bikeSpeed > 26) bikeSpeed = 26;

      // Controles
      if (keys["ArrowRight"]) bikeSpeed = Math.min(bikeSpeed + 0.4, 28);
      if (keys["ArrowLeft"]) bikeSpeed = Math.max(bikeSpeed - 0.5, 5);

      // Pulo
      if ((keys[" "] || keys["ArrowUp"]) && !isJumping) {
        velocityY = -19;
        isJumping = true;
      }

      velocityY += gravity;
      bikeY += velocityY;

      if (bikeY >= 340) {
        bikeY = 340;
        velocityY = 0;
        isJumping = false;
      }

      // Obstáculos
      if (Date.now() - lastObstacle > Math.max(650, 1600 - level * 90)) {
        obstacles.push({ x: canvas.width + 50, y: 340 });
        lastObstacle = Date.now();
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= bikeSpeed;

        // Colisão
        if (
          obstacles[i].x < bikeX + 85 &&
          obstacles[i].x + 45 > bikeX + 15 &&
          bikeY + 45 > obstacles[i].y
        ) {
          gameOver = true;
        }

        if (obstacles[i].x < -60) obstacles.splice(i, 1);
      }

      // Poeira
      if (Math.random() < 0.6) createParticles(bikeX + 15, bikeY);

      score += Math.floor(bikeSpeed / 3);
      scoreEl.textContent = score;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawObstacles();
      drawBike();
      drawParticles();

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "bold 60px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, 200);
        
        ctx.font = "30px Arial";
        ctx.fillText(`Distância: ${score}m`, canvas.width/2, 270);
        ctx.fillText(`Nível ${level}`, canvas.width/2, 310);
        ctx.fillText("Pressione F5 para jogar novamente", canvas.width/2, 380);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>

  <p style="position:absolute;bottom:15px;color:#ccc;text-align:center;width:100%;font-size:14px;">
    ← → : Velocidade | ESPAÇO ou ↑ : Pular
  </p>
</body>
</html>
