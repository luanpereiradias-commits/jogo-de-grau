<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner - Premium</title>
  <style>
    body {
      margin: 0; padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      user-select: none;
    }
    canvas {
      border: 6px solid #1a1a1a;
      border-radius: 15px;
      box-shadow: 0 0 50px rgba(0, 255, 120, 0.6);
    }
    #hud { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); color: white; text-align: center; text-shadow: 0 3px 12px black; z-index: 10; pointer-events: none; }
    #score { font-size: 38px; font-weight: bold; letter-spacing: 2px; }
    #level { font-size: 22px; color: #ffd700; margin-top: 4px; }
    #highscore { font-size: 16px; color: #aaa; margin-top: 8px; }
    #restart, #pauseScreen {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.92); color: white; padding: 30px 50px; border-radius: 16px;
      text-align: center; display: none; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Distância: <span id="score">0</span>m</div>
    <div id="level">Nível 1</div>
    <div id="highscore">Recorde: 0m</div>
  </div>
  <canvas id="gameCanvas" width="950" height="520"></canvas>
  <div id="restart">
    <h2>GAME OVER</h2>
    <p>Distância: <span id="finalScore">0</span>m</p>
    <p>Nível: <span id="finalLevel">1</span></p>
    <button onclick="restartGame()" style="padding:14px 40px; font-size:19px; margin-top:15px; cursor:pointer;">
      Jogar Novamente (R)
    </button>
  </div>
  <div id="pauseScreen">
    <h2>PAUSADO</h2>
    <p>Pressione P para continuar</p>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const highscoreEl = document.getElementById("highscore");
    const restartScreen = document.getElementById("restart");
    const pauseScreen = document.getElementById("pauseScreen");
    const finalScoreEl = document.getElementById("finalScore");
    const finalLevelEl = document.getElementById("finalLevel");

    let gameState = {
      bikeX: 130, bikeY: 355, bikeSpeed: 7, velocityY: 0, gravity: 0.85,
      isJumping: false, score: 0, highScore: localStorage.getItem("motoHighScore") || 0,
      gameTime: 0, level: 1, gameOver: false, paused: false,
      timeOfDay: 0, wheelAngle: 0, cloudOffset: 0, lastObstacleTime: Date.now(),
      shake: 0
    };

    let obstacles = [], particles = [], exhaustTrails = [], keys = {};
    let lastTime = 0;

    highscoreEl.textContent = `Recorde: ${gameState.highScore}m`;

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    // ==================== PARALLAX LAYERS ====================
    let parallaxLayers = [
      { speed: 0.3, y: 220, height: 140, color: "#1e3a2f" },   // Montanhas distantes
      { speed: 0.7, y: 280, height: 100, color: "#255d3f" }    // Colinas médias
    ];

    // ==================== MELHOR DESENHO DA MOTO + PILOTO ====================
    function drawBike() {
      const x = gameState.bikeX;
      const y = gameState.bikeY;
      const lean = gameState.bikeSpeed > 18 ? (gameState.bikeSpeed - 18) * 0.8 : 0;
      const bob = gameState.isJumping ? Math.sin(gameState.gameTime / 60) * 4 : 0;

      // Screen Shake
      const shakeX = Math.random() * gameState.shake - gameState.shake / 2;
      const shakeY = Math.random() * gameState.shake - gameState.shake / 2;

      gameState.wheelAngle += gameState.bikeSpeed * 0.18;

      // Sombra
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x + 12 + shakeX, y + 52 + shakeY, 95, 16);

      // === PILOTO ===
      ctx.save();
      ctx.translate(x + 65 + shakeX, y + 22 + bob + shakeY);
      ctx.rotate(lean * -0.015);

      // Corpo
      ctx.fillStyle = "#222";
      ctx.fillRect(-8, 0, 28, 35);
      // Braço
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(12, 8, 18, 12);
      // Capacete
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.ellipse(12, -8, 18, 16, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff2222";
      ctx.fillRect(22, -12, 8, 8); // Faixa vermelha

      ctx.restore();

      // === MOTO ===
      // Chassi principal
      const grad = ctx.createLinearGradient(x+25, y+15, x+105, y+45);
      grad.addColorStop(0, "#e63939");
      grad.addColorStop(1, "#9e1f1f");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x+28, y+22);
      ctx.quadraticCurveTo(x+48, y+10, x+78, y+18);
      ctx.lineTo(x+102, y+42);
      ctx.lineTo(x+38, y+52);
      ctx.lineTo(x+22, y+32);
      ctx.closePath();
      ctx.fill();

      // Detalhes cromados
      ctx.fillStyle = "#ddd";
      ctx.fillRect(x+42, y+20, 42, 9);
      ctx.fillStyle = "#444";
      ctx.fillRect(x+35, y+42, 48, 14);

      // Escapamento duplo
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(x+38, y+50);
      ctx.quadraticCurveTo(x+12, y+54, x+5, y+62);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x+45, y+52);
      ctx.quadraticCurveTo(x+18, y+58, x+11, y+68);
      ctx.stroke();

      if (gameState.bikeSpeed > 12) createExhaust(x + 8, y + 62);

      // Rodas com mais detalhes
      ctx.strokeStyle = "#111"; ctx.lineWidth = 26;
      ctx.beginPath(); ctx.arc(x+35, y+52, 20, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+92, y+52, 20, 0, Math.PI*2); ctx.stroke();

      ctx.strokeStyle = "#ccc"; ctx.lineWidth = 9;
      ctx.save(); ctx.translate(x+35, y+52); ctx.rotate(gameState.wheelAngle);
      ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.stroke(); ctx.restore();
      ctx.save(); ctx.translate(x+92, y+52); ctx.rotate(gameState.wheelAngle);
      ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.stroke(); ctx.restore();

      // Farol
      ctx.fillStyle = "#ffeecc";
      ctx.beginPath(); ctx.ellipse(x+105, y+26, 15, 13, -0.6, 0, Math.PI*2); ctx.fill();
    }

    // ==================== BACKGROUND COM PARALLAX ====================
    function drawBackground() {
      const t = gameState.timeOfDay;

      // Céu
      const sky = ctx.createLinearGradient(0, 0, 0, 360);
      sky.addColorStop(0, `rgb(${Math.floor(12+38*(1-t))},${Math.floor(68-58*t)},${Math.floor(135-88*t)})`);
      sky.addColorStop(1, t > 0.65 ? "#0f0f3d" : "#7bc6ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, 380);

      // Sol / Lua
      if (t < 0.65) {
        ctx.fillStyle = `rgba(255,240,100,${1-t})`;
        ctx.beginPath(); ctx.arc(760, 105, 52, 0, Math.PI*2); ctx.fill();
      }

      // Nuvens
      gameState.cloudOffset = (gameState.cloudOffset + 0.4) % (canvas.width + 400);
      ctx.fillStyle = `rgba(255,255,255,${0.85 - t*0.7})`;
      for (let i = 0; i < 5; i++) {
        let x = (i*260 + gameState.cloudOffset) % (canvas.width + 400) - 100;
        ctx.beginPath(); ctx.ellipse(x+70, 68+i*25, 65, 28, 0, 0, Math.PI*2); ctx.fill();
      }

      // Parallax Layers
      for (let layer of parallaxLayers) {
        const offset = (gameState.score * layer.speed) % (canvas.width * 1.8);
        ctx.fillStyle = layer.color;
        ctx.fillRect(0, layer.y, canvas.width, layer.height);

        // Detalhes nas camadas
        ctx.fillStyle = t > 0.5 ? "#0a1f18" : "#1a3f2a";
        for (let i = -1; i < 4; i++) {
          let x = (i * 280 - offset) % (canvas.width * 2);
          ctx.beginPath();
          ctx.moveTo(x, layer.y + 20);
          ctx.lineTo(x+80, layer.y - 35);
          ctx.lineTo(x+160, layer.y + 20);
          ctx.fill();
        }
      }

      // Estrada
      const road = ctx.createLinearGradient(0,380,0,520);
      road.addColorStop(0, t > 0.5 ? "#1f1f1f" : "#2a2a2a");
      road.addColorStop(1, "#0f0f0f");
      ctx.fillStyle = road;
      ctx.fillRect(0,380,canvas.width,140);

      // Linhas da estrada com motion blur
      const blur = Math.min(gameState.bikeSpeed / 22, 1.8);
      ctx.strokeStyle = "#ffeb3b";
      ctx.lineWidth = 11;
      for (let i = -100; i < canvas.width + 150; i += 88) {
        let pos = i - (gameState.score * 3.4 % 88);
        ctx.globalAlpha = 0.9 - blur * 0.3;
        ctx.beginPath();
        ctx.moveTo(pos, 428);
        ctx.lineTo(pos + 58, 428);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function createExhaust(x, y) {
      const intensity = Math.max(0, (gameState.bikeSpeed - 12) / 18);
      for (let i = 0; i < 5 + intensity * 6; i++) {
        exhaustTrails.push({
          x: x + Math.random() * 10 - 5,
          y: y + Math.random() * 8 - 4,
          vx: -gameState.bikeSpeed * 0.75 - Math.random() * 9,
          vy: -Math.random() * 5 - 1.5,
          life: 22 + intensity * 18,
          size: 8 + intensity * 11,
          hue: 18 + Math.random() * 40
        });
      }
    }

    // ... (demais funções permanecem iguais: particles, obstacles, etc.)

    function update(delta) {
      gameState.gameTime += delta;
      gameState.timeOfDay = Math.min(1, gameState.gameTime / 2600);

      // Dificuldade
      if (Math.floor(gameState.gameTime) % 240 === 0 && gameState.bikeSpeed < 36) {
        gameState.bikeSpeed += 0.6;
        gameState.level = Math.floor((gameState.bikeSpeed - 5) / 3.8) + 1;
        levelEl.textContent = `Nível ${gameState.level}`;
      }

      // Controles
      if (keys["ArrowRight"]) gameState.bikeSpeed = Math.min(gameState.bikeSpeed + 0.65, 36);
      if (keys["ArrowLeft"]) gameState.bikeSpeed = Math.max(gameState.bikeSpeed - 0.85, 5);

      if ((keys[" "] || keys["ArrowUp"]) && !gameState.isJumping) {
        gameState.velocityY = -23.5;
        gameState.isJumping = true;
      }

      // Física
      gameState.velocityY += gameState.gravity;
      gameState.bikeY += gameState.velocityY;
      if (gameState.bikeY >= 355) {
        gameState.bikeY = 355;
        gameState.velocityY = 0;
        gameState.isJumping = false;
        if (gameState.bikeSpeed > 20) gameState.shake = 4; // Screen shake ao cair
      }

      // Screen shake decay
      gameState.shake *= 0.85;

      // Obstáculos, partículas, etc. (mesmo código anterior)
      if (Date.now() - gameState.lastObstacleTime > Math.max(420, 1280 - gameState.level * 82)) {
        const types = ["rock", "barrel", "log", "box"];
        obstacles.push({
          x: canvas.width + 60,
          y: 330 + Math.random() * 32,
          type: types[Math.floor(Math.random() * 4)],
          width: 58, height: 55
        });
        gameState.lastObstacleTime = Date.now();
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameState.bikeSpeed;
        const o = obstacles[i];
        if (o.x < gameState.bikeX + 95 && o.x + o.width > gameState.bikeX + 18 &&
            gameState.bikeY + 52 > o.y && gameState.bikeY + 22 < o.y + o.height) {
          endGame();
        }
        if (o.x < -100) obstacles.splice(i, 1);
      }

      if (Math.random() < 0.85) createGroundParticles(gameState.bikeX, gameState.bikeY);
      gameState.score += Math.floor(gameState.bikeSpeed / 2.5);
      scoreEl.textContent = gameState.score;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      obstacles.forEach(o => {
        ctx.save();
        ctx.translate(o.x, o.y);
        // desenho dos obstáculos (mantido igual)
        if (o.type === "rock") {
          ctx.fillStyle = "#555";
          ctx.beginPath(); ctx.ellipse(26,32,29,23,0,0,Math.PI*2); ctx.fill();
        } else if (o.type === "barrel") {
          ctx.fillStyle = "#c8102e"; ctx.fillRect(8,10,42,52);
          ctx.fillStyle = "#f1c40f"; ctx.fillRect(8,28,42,10);
        } else if (o.type === "log") {
          ctx.fillStyle = "#8d5f2e"; ctx.fillRect(6,22,56,26);
        } else if (o.type === "box") {
          ctx.fillStyle = "#b97a3d"; ctx.fillRect(12,16,42,46);
        }
        ctx.restore();
      });

      drawBike();
      drawParticles();
      drawExhaustTrails();

      if (gameState.gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.78)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    // Funções restantes (createGroundParticles, drawParticles, drawExhaustTrails, endGame, restartGame, etc.) permanecem as mesmas do código original.

    // ... (copie as funções restantes do seu código original aqui)

    document.addEventListener("keydown", e => {
      if (gameState.gameOver && e.key.toLowerCase() === "r") restartGame();
      if (e.key.toLowerCase() === "p" && !gameState.gameOver) {
        gameState.paused = !gameState.paused;
        pauseScreen.style.display = gameState.paused ? "block" : "none";
      }
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
