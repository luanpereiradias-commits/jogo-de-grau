
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Moto - Corrida Infinita</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(#0a0a0a, #1a1a2e);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.5);
        }
        canvas {
            background: #000;
            display: block;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 3px solid #00ff88;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            background: #00ff88;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #00cc66;
        }
        .info {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui">
            <div>Pontos: <span id="score">0</span></div>
            <div>Distância: <span id="distance">0</span>m</div>
        </div>
        
        <div id="gameOver">
            <h1>Game Over</h1>
            <p>Pontuação Final: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Jogar Novamente</button>
        </div>
        
        <div class="info">← → Trocar faixa | ESPAÇO Pular | P = Pausar</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Variáveis do jogo
        let gameRunning = true;
        let score = 0;
        let distance = 0;
        let speed = 6;
        let gameSpeed = speed;
        
        // Faixas (3 faixas)
        const lanes = [200, 400, 600];
        let playerLane = 1; // 0, 1, 2
        let playerY = 350;
        let playerX = lanes[playerLane];
        let playerVelocityY = 0;
        let isJumping = false;
        let playerWidth = 60;
        let playerHeight = 40;
        
        // Arrays do jogo
        let obstacles = [];
        let coins = [];
        let particles = [];
        
        // Controles
        let keys = {};
        
        // Imagens (usando emojis e formas simples)
        function drawMoto(x, y) {
            // Moto
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(x - 25, y - 15, 50, 25); // corpo
            
            // Roda dianteira
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(x - 18, y + 10, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.arc(x - 18, y + 10, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Roda traseira
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(x + 18, y + 10, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.arc(x + 18, y + 10, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Piloto
            ctx.fillStyle = '#ff3366';
            ctx.fillRect(x - 10, y - 25, 20, 15);
        }
        
        class Obstacle {
            constructor(lane) {
                this.lane = lane;
                this.x = lanes[lane];
                this.y = -50;
                this.width = 70;
                this.height = 60;
                this.type = Math.random() > 0.5 ? 'car' : 'barrier';
            }
            
            update() {
                this.y += gameSpeed;
            }
            
            draw() {
                if (this.type === 'car') {
                    ctx.fillStyle = '#ff3366';
                    ctx.fillRect(this.x - 30, this.y, 60, 40);
                    ctx.fillStyle = '#222';
                    ctx.fillRect(this.x - 25, this.y + 5, 15, 10);
                    ctx.fillRect(this.x + 10, this.y + 5, 15, 10);
                } else {
                    ctx.fillStyle = '#ffaa00';
                    ctx.fillRect(this.x - 35, this.y, 70, 25);
                    ctx.fillStyle = '#ff5500';
                    ctx.fillRect(this.x - 25, this.y + 5, 50, 10);
                }
            }
        }
        
        class Coin {
            constructor(lane) {
                this.lane = lane;
                this.x = lanes[lane];
                this.y = -30;
                this.radius = 15;
                this.collected = false;
            }
            
            update() {
                this.y += gameSpeed;
            }
            
            draw() {
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('R$', this.x - 8, this.y + 6);
            }
        }
        
        function spawnObstacle() {
            if (Math.random() < 0.03) {
                const lane = Math.floor(Math.random() * 3);
                obstacles.push(new Obstacle(lane));
            }
        }
        
        function spawnCoin() {
            if (Math.random() < 0.04) {
                const lane = Math.floor(Math.random() * 3);
                coins.push(new Coin(lane));
            }
        }
        
        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.random() * 6 - 3,
                    vy: Math.random() * -4 - 2,
                    life: 30,
                    color: '#00ff88'
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Movimento do jogador
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                if (playerLane > 0) {
                    playerLane--;
                    playerX = lanes[playerLane];
                }
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                if (playerLane < 2) {
                    playerLane++;
                    playerX = lanes[playerLane];
                }
            }
            
            // Pulo
            if ((keys[' '] || keys['Space']) && !isJumping) {
                playerVelocityY = -18;
                isJumping = true;
            }
            
            // Física do pulo
            playerVelocityY += 0.8; // gravidade
            playerY += playerVelocityY;
            
            if (playerY >= 350) {
                playerY = 350;
                playerVelocityY = 0;
                isJumping = false;
            }
            
            // Atualizar obstáculos
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (obstacles[i].y > canvas.height + 50) {
                    obstacles.splice(i, 1);
                }
            }
            
            // Atualizar moedas
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].update();
                if (coins[i].y > canvas.height + 50) {
                    coins.splice(i, 1);
                }
            }
            
            // Colisão com obstáculos
            for (let obs of obstacles) {
                if (!isJumping && 
                    Math.abs(playerX - obs.x) < 45 && 
                    Math.abs(playerY - obs.y) < 45) {
                    gameOver();
                    return;
                }
            }
            
            // Coleta de moedas
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                if (Math.abs(playerX - coin.x) < 40 && 
                    Math.abs(playerY - coin.y) < 40) {
                    score += 10;
                    createParticles(coin.x, coin.y);
                    coins.splice(i, 1);
                }
            }
            
            // Partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.2;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Aumentar dificuldade
            distance += Math.floor(gameSpeed / 2);
            if (distance % 500 === 0 && gameSpeed < 12) {
                gameSpeed += 0.3;
            }
            
            // Spawn
            spawnObstacle();
            spawnCoin();
            
            // Atualizar UI
            document.getElementById('score').textContent = score;
            document.getElementById('distance').textContent = distance;
        }
        
        function drawBackground() {
            // Céu noturno
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(1, '#1a2a1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Estrada
            ctx.fillStyle = '#222';
            ctx.fillRect(100, 0, 600, canvas.height);
            
            // Faixas laterais
            ctx.fillStyle = '#555';
            ctx.fillRect(80, 0, 20, canvas.height);
            ctx.fillRect(700, 0, 20, canvas.height);
            
            // Linhas da estrada
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 8;
            for (let i = -100; i < canvas.height + 100; i += 60) {
                const y = (i + (Date.now() / 8) % 60) % (canvas.height + 200) - 100;
                ctx.beginPath();
                ctx.moveTo(250, y);
                ctx.lineTo(250, y + 40);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(550, y);
                ctx.lineTo(550, y + 40);
                ctx.stroke();
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            
            // Desenhar obstáculos
            for (let obs of obstacles) {
                obs.draw();
            }
            
            // Desenhar moedas
            for (let coin of coins) {
                coin.draw();
            }
            
            // Desenhar moto
            drawMoto(playerX, playerY);
            
            // Partículas
            for (let p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 6, 6);
            }
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            // Resetar variáveis
            obstacles = [];
            coins = [];
            particles = [];
            playerLane = 1;
            playerX = lanes[1];
            playerY = 350;
            score = 0;
            distance = 0;
            gameSpeed = speed;
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
        }
        
        // Controles
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            
            if (e.key === 'p' || e.key === 'P') {
                // Pause simples (só para teste)
                alert('Jogo pausado. Clique OK para continuar.');
            }
        });
        
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });
        
        // Suporte para toque (mobile)
        let touchStartX = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        canvas.addEventListener('touchend', e => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            
            if (diff > 50 && playerLane < 2) {
                playerLane++;
                playerX = lanes[playerLane];
            } else if (diff < -50 && playerLane > 0) {
                playerLane--;
                playerX = lanes[playerLane];
            } else {
                // Toque simples = pular
                if (!isJumping) {
                    playerVelocityY = -18;
                    isJumping = true;
                }
            }
        });
        
        // Iniciar o jogo
        gameLoop();
        
        // Dica inicial
        setTimeout(() => {
            alert("🚀 Bem-vindo ao Subway Moto!\n\nControles:\n← → ou A/D = Trocar faixa\nESPAÇO = Pular\n\nDesvie dos carros e colete as moedas!");
        }, 800);
    </script>
</body>
</html>
