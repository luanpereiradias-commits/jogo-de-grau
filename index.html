<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Moto X3M Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        #canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #instrucoes {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="instrucoes">
        <h2>Moto X3M Prototipo</h2>
        <p>Seta Para Cima (↑): Acelerar | Seta Para Baixo (↓): Frear</p>
        <p>Seta Esquerda (←): Inclinar para Trás | Seta Direita (→): Inclinar para Frente</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Módulos do Matter.js
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Vector } = Matter;

        // Criar o motor físico e o mundo
        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 1.2; // Gravidade um pouco mais forte para o estilo arcade

        // Criar o renderizador (tela do jogo)
        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: 1000,
                height: 600,
                wireframes: false, // Define como false para ver as cores dos blocos
                background: '#223344'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- CRIANDO O CENÁRIO (Pistas e Rampas) ---
        const chaoOpcoes = { isStatic: true, render: { fillStyle: '#33aa55' } };
        
        Composite.add(world, [
            // Plataforma inicial
            Bodies.rectangle(200, 500, 400, 40, chaoOpcoes),
            // Rampa 1
            Bodies.rectangle(550, 450, 300, 40, { isStatic: true, angle: -0.4, render: { fillStyle: '#33aa55' } }),
            // Grande vão e plataforma de pouso
            Bodies.rectangle(1000, 550, 400, 40, chaoOpcoes),
            // Rampa 2 (Looping/Lançador)
            Bodies.rectangle(1400, 450, 400, 40, { isStatic: true, angle: -0.6, render: { fillStyle: '#33aa55' } }),
            // Plataforma final com a "Chegada"
            Bodies.rectangle(2000, 300, 600, 40, chaoOpcoes),
            // Linha de chegada (Sensor Vermelho)
            Bodies.rectangle(2200, 230, 20, 100, { isStatic: true, isSensor: true, render: { fillStyle: '#ff3333' } })
        ]);

        // --- CRIANDO A MOTO ---
        // Corpo principal (Chassi)
        const chassi = Bodies.rectangle(100, 400, 70, 15, { 
            collisionFilter: { group: -1 }, // Evita que as rodas colidam com o próprio chassi
            render: { fillStyle: '#ff9900' } 
        });

        // Rodas (Círculos com alta fricção para dar tração)
        const rodaOpcoes = { 
            friction: 0.8, 
            collisionFilter: { group: -1 },
            render: { fillStyle: '#333333' } 
        };
        const rodaTraseira = Bodies.circle(70, 430, 18, rodaOpcoes);
        const rodaDianteira = Bodies.circle(130, 430, 18, rodaOpcoes);

        // Suspensão (Fazer a união elástica das rodas com o chassi)
        const molaTraseira = Constraint.create({
            bodyA: chassi,
            bodyB: rodaTraseira,
            pointB: { x: 0, y: 0 },
            pointA: { x: -30, y: 15 },
            stiffness: 0.4,
            length: 10,
            render: { strokeStyle: '#ffffff', lineWidth: 3 }
        });

        const molaDianteira = Constraint.create({
            bodyA: chassi,
            bodyB: rodaDianteira,
            pointB: { x: 0, y: 0 },
            pointA: { x: 30, y: 15 },
            stiffness: 0.4,
            length: 10,
            render: { strokeStyle: '#ffffff', lineWidth: 3 }
        });

        // Adicionar a moto inteira ao mundo
        Composite.add(world, [chassi, rodaTraseira, rodaDianteira, molaTraseira, molaDianteira]);

        // --- CONTROLES DA MOTO ---
        const teclas = {};
        window.addEventListener('keydown', (e) => teclas[e.code] = true);
        window.addEventListener('keyup', (e) => teclas[e.code] = false);

        // Loop de atualização dos comandos (Input)
        Matter.Events.on(engine, 'beforeUpdate', () => {
            const velocidadeRotacaoRoda = 0.3;
            const forcaInclinacao = 0.08;

            // Acelerar (Gira a roda traseira)
            if (teclas['ArrowUp']) {
                Body.setAngularVelocity(rodaTraseira, velocidadeRotacaoRoda);
            }
            // Frear / Ré
            if (teclas['ArrowDown']) {
                Body.setAngularVelocity(rodaTraseira, -velocidadeRotacaoRoda / 2);
            }
            // Inclinar para Trás (Empinar)
            if (teclas['ArrowLeft']) {
                Body.setAngularVelocity(chassi, -forcaInclinacao);
            }
            // Inclinar para Frente
            if (teclas['ArrowRight']) {
                Body.setAngularVelocity(chassi, forcaInclinacao);
            }

            // --- CÂMERA DINÂMICA ---
            // Faz a tela seguir a posição horizontal (X) do chassi da moto
            Render.lookAt(render, {
                min: { x: chassi.position.x - 300, y: chassi.position.y - 350 },
                max: { x: chassi.position.x + 700, y: chassi.position.y + 250 }
            });

            // Condição de reinício se cair no abismo
            if (chassi.position.y > 1000) {
                reiniciarJogo();
            }

            // Condição de vitória ao passar da linha vermelha
            if (chassi.position.x > 2200 && chassi.position.y < 300) {
                alert("Você venceu! Parabéns!");
                reiniciarJogo();
            }
        });

        function reiniciarJogo() {
            // Reseta posições e velocidades da moto
            Body.setPosition(chassi, { x: 100, y: 400 });
            Body.setVelocity(chassi, { x: 0, y: 0 });
            Body.setAngularVelocity(chassi, 0);

            Body.setPosition(rodaTraseira, { x: 70, y: 430 });
            Body.setVelocity(rodaTraseira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaTraseira, 0);

            Body.setPosition(rodaDianteira, { x: 130, y: 430 });
            Body.setVelocity(rodaDianteira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaDianteira, 0);
        }
    </script>
</body>
</html>
