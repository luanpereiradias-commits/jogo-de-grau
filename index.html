<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor X3M - Visual Enhanced</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111; /* Fallback */
            background: radial-gradient(circle, #2a3d50 0%, #111e29 100%);
            overflow: hidden;
            font-family: 'Orbitron', 'Russo One', sans-serif; /* Fontes de estilo jogo/futurista */
            color: #ddd;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Russo+One&display=swap');

        #canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #instrucoes {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(10, 20, 30, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            pointer-events: none;
            border: 2px solid #555;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        #instrucoes h1 {
            margin: 0 0 10px;
            font-family: 'Russo One', sans-serif;
            color: #ff9900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 2.2em;
            text-shadow: 2px 2px 0 #000;
        }

        #instrucoes p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #ddd;
        }

        #instrucoes .btn-highlight {
            color: #fff;
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #444;
            display: inline-block;
            margin: 0 2px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="instrucoes">
        <h1>MOTOR X3M</h1>
        <p><span class="btn-highlight">↑</span> ACELERAR | <span class="btn-highlight">↓</span> FREAR</p>
        <p><span class="btn-highlight">←</span> INCLINAR TRÁS | <span class="btn-highlight">→</span> INCLINAR FRENTE</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Vector, Events } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 1.4; // Ligeiramente mais forte para gravidade de jogo

        const renderWidth = 1200;
        const renderHeight = 700;

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: renderWidth,
                height: renderHeight,
                wireframes: false, // Fundamental para ver os visuais personalizados
                background: 'transparent', // Permite que o fundo CSS apareça
                pixelRatio: window.devicePixelRatio, // Melhora a nitidez em telas de alta resolução
                showAxes: false,
                showAngleIndicator: false
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- VISUAIS DAS PISTAS E OBJETOS ---
        // Estilo Neon-SciFi
        const materialPista = { fillStyle: '#1a1a1a', strokeStyle: '#5eef5e', lineWidth: 4 };
        const materialPlataforma = { fillStyle: '#2a2a2a', strokeStyle: '#5eefef', lineWidth: 3 };
        
        Composite.add(world, [
            // Plataforma inicial
            Bodies.rectangle(200, 550, 400, 60, { isStatic: true, render: materialPista, chamfer: { radius: 10 } }),
            // Rampa 1
            Bodies.rectangle(550, 500, 300, 50, { isStatic: true, angle: -0.3, render: materialPista, chamfer: { radius: 5 } }),
            // Plataforma de pouso (intermediária)
            Bodies.rectangle(1000, 600, 400, 60, { isStatic: true, render: materialPlataforma }),
            // Rampa 2 (Lançador)
            Bodies.rectangle(1400, 480, 400, 40, { isStatic: true, angle: -0.7, render: materialPista }),
            // Plataforma final (Alvo)
            Bodies.rectangle(2100, 320, 600, 50, { isStatic: true, render: materialPlataforma, chamfer: { radius: 15 } }),
            
            // OBSTÁCULOS VISUAIS E FÍSICOS
            // Caixas empilhadas
            Bodies.rectangle(1850, 270, 60, 60, { friction: 0.9, render: { fillStyle: '#aa6633', strokeStyle: '#4d2d0f', lineWidth: 2 } }),
            Bodies.rectangle(1850, 210, 50, 50, { friction: 0.9, render: { fillStyle: '#aa6633', strokeStyle: '#4d2d0f', lineWidth: 2 } }),

            // Linha de chegada (Visivelmente destacada)
            Bodies.rectangle(2300, 180, 25, 230, { 
                isStatic: true, 
                isSensor: true, 
                render: { 
                    fillStyle: '#ff3333', 
                    strokeStyle: '#fff', 
                    lineWidth: 3, 
                    // Efeito de pulso simples via opacidade (gerido no loop)
                    visible: true 
                } 
            })
        ]);

        // --- VISUAIS E ESTRUTURA DA MOTO "BLADE RUNNER" ---
        // Filtro de colisão para que a moto não colida consigo mesma
        const motoCollisionGroup = Body.nextGroup(true);

        // Chassi: Estilizado como uma forma angular, não um retângulo simples
        const chassiVertices = [
            { x: 0, y: 0 }, { x: 80, y: 0 }, { x: 100, y: 20 }, 
            { x: 70, y: 35 }, { x: 10, y: 35 }, { x: -20, y: 20 }
        ];
        const chassi = Bodies.fromVertices(120, 450, chassiVertices, { 
            collisionFilter: { group: motoCollisionGroup },
            density: 0.01,
            render: { fillStyle: '#ff9900', strokeStyle: '#fff', lineWidth: 2 } 
        });

        // Rodas: Design 'Turbine'
        const rodaOpcoes = { 
            friction: 1, 
            frictionStatic: 2, // Maior tração inicial
            collisionFilter: { group: motoCollisionGroup },
            render: { 
                fillStyle: '#222', 
                strokeStyle: '#999', 
                lineWidth: 5,
                // Uma 'marca' para ver a roda girar
                sprite: {
                    xOffset: 0,
                    yOffset: 0,
                    texHash: 'roda_sprite' // Apenas um hash para identificar
                }
            } 
        };
        const rodaTraseira = Bodies.circle(70, 490, 25, rodaOpcoes);
        const rodaDianteira = Bodies.circle(170, 490, 25, rodaOpcoes);

        // Suspensão e Estrutura: Mais 'reais'
        const esteticaOpcoes = { strokeStyle: '#bbb', lineWidth: 4 };

        const molaTraseira = Constraint.create({
            bodyA: chassi, bodyB: rodaTraseira,
            pointB: { x: 0, y: 0 }, pointA: { x: -35, y: 20 },
            stiffness: 0.3, length: 25, render: esteticaOpcoes
        });

        const molaDianteira = Constraint.create({
            bodyA: chassi, bodyB: rodaDianteira,
            pointB: { x: 0, y: 0 }, pointA: { x: 55, y: 20 },
            stiffness: 0.3, length: 25, render: esteticaOpcoes
        });

        const bracoOscilante = Constraint.create({
             bodyA: chassi, bodyB: rodaTraseira,
             pointB: { x: 0, y: 0 }, pointA: { x: 0, y: 20 },
             stiffness: 0.9, length: 40, render: { visible: false } // Braço invisível para estrutura
        });

        Composite.add(world, [chassi, rodaTraseira, rodaDianteira, molaTraseira, molaDianteira, bracoOscilante]);

        // --- LOGICA DO JOGO E EFEITOS VISUAIS ---
        const teclas = {};
        window.addEventListener('keydown', (e) => teclas[e.code] = true);
        window.addEventListener('keyup', (e) => teclas[e.code] = false);

        let tempoPoeira = 0;
        const particulasPoeira = [];

        Events.on(engine, 'afterUpdate', () => {
            const velRotacao = 0.35;
            const forcaInclinacao = 0.12;

            // Controles de tração
            if (teclas['ArrowUp']) {
                Body.setAngularVelocity(rodaTraseira, velRotacao);
                // Pequeno efeito de poeira quando acelera
                if (Math.abs(rodaTraseira.angularVelocity) > 0.1 && tempoPoeira % 5 === 0) {
                     criarParticulaPoeira(rodaTraseira.position.x, rodaTraseira.position.y + 25);
                }
            }
            if (teclas['ArrowDown']) {
                Body.setAngularVelocity(rodaTraseira, -velRotacao / 1.5); // Freio/Ré mais lento
            }
            // Controles de inclinação no ar
            if (teclas['ArrowLeft']) Body.setAngularVelocity(chassi, -forcaInclinacao);
            if (teclas['ArrowRight']) Body.setAngularVelocity(chassi, forcaInclinacao);

            // Gesto visual da roda (desenhar uma linha para ver rotação)
            desenharMarcasRodas(rodaTraseira);
            desenharMarcasRodas(rodaDianteira);

            // --- CÂMERA SUAVE (Lagging Camera) ---
            const targetX = chassi.position.x;
            const targetY = chassi.position.y;
            const currentMinX = render.bounds.min.x;
            const currentMinY = render.bounds.min.y;

            // A câmera 'persegue' a moto com um pequeno atraso
            const smoothFactor = 0.05;
            const newMinX = currentMinX + (targetX - 400 - currentMinX) * smoothFactor;
            const newMinY = currentMinY + (targetY - 450 - currentMinY) * smoothFactor;

            Render.lookAt(render, {
                min: { x: newMinX, y: newMinY },
                max: { x: newMinX + renderWidth, y: newMinY + renderHeight }
            });

            // GESTÃO DE POEIRA
            for (let i = particulasPoeira.length - 1; i >= 0; i--) {
                const p = particulasPoeira[i];
                p.render.opacity -= 0.02;
                if (p.render.opacity <= 0) {
                    Composite.remove(world, p);
                    particulasPoeira.splice(i, 1);
                }
            }
            tempoPoeira++;

            // Condições de Jogo
            if (chassi.position.y > 1100) reiniciarJogo();
            if (chassi.position.x > 2300 && chassi.position.y < 350) {
                // Efeito de vitória visual antes do alert
                chassi.render.fillStyle = '#fff';
                setTimeout(() => {
                    alert("VITÓRIA! Você dominou o setor!");
                    reiniciarJogo();
                }, 100);
            }
        });

        // Funções Auxiliares Visuais
        function criarParticulaPoeira(x, y) {
            const p = Bodies.circle(x, y, 4, {
                isSensor: true,
                frictionAir: 0.05,
                render: { fillStyle: '#666', opacity: 0.8, visible: true },
                collisionFilter: { group: motoCollisionGroup } // Não colidir com a moto
            });
            Body.setVelocity(p, { x: (Math.random() - 0.5) * 2, y: (Math.random() - 0.5) * 1 });
            particulasPoeira.push(p);
            Composite.add(world, p);
        }

        // Esta função desenha diretamente no canvas do Matter.js para criar detalhes visuais
        function desenharMarcasRodas(roda) {
            const context = render.context;
            const angle = roda.angle;
            const radius = roda.circleRadius;
            const pos = roda.position;

            // Converter posição do mundo para posição da tela (necessário por causa da câmera)
            const screenX = pos.x - render.bounds.min.x;
            const screenY = pos.y - render.bounds.min.y;

            context.save();
            context.translate(screenX, screenY);
            context.rotate(angle);
            
            // Desenhar raios da roda para ver a rotação
            context.beginPath();
            context.moveTo(0, -radius + 5);
            context.lineTo(0, radius - 5);
            context.moveTo(-radius + 5, 0);
            context.lineTo(radius - 5, 0);
            context.strokeStyle = '#fff';
            context.lineWidth = 2;
            context.stroke();
            
            // Desenhar o cubo central
            context.beginPath();
            context.arc(0, 0, 8, 0, Math.PI * 2);
            context.fillStyle = '#ff9900';
            context.fill();
            context.strokeStyle = '#fff';
            context.stroke();

            context.restore();
        }

        function reiniciarJogo() {
            chassi.render.fillStyle = '#ff9900'; // Reset cor
            const startX = 120, startY = 450;
            
            Body.setPosition(chassi, { x: startX, y: startY });
            Body.setVelocity(chassi, { x: 0, y: 0 });
            Body.setAngularVelocity(chassi, 0);

            Body.setPosition(rodaTraseira, { x: startX - 50, y: startY + 40 });
            Body.setVelocity(rodaTraseira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaTraseira, 0);

            Body.setPosition(rodaDianteira, { x: startX + 50, y: startY + 40 });
            Body.setVelocity(rodaDianteira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaDianteira, 0);
        }
    </script>
</body>
</html>
