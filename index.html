<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protótipo Moto X3M Clone</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; overflow: hidden; font-family: sans-serif; color: white; }
        #canvas-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #controles { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; pointer-events: none; }
        #placar { position: absolute; bottom: 10px; right: 10px; font-size: 24px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="controles">
        <h3>Controles (Setas):</h3>
        <p>↑ : Acelerar | ↓ : Frear/Ré</p>
        <p>← : Inclinar Trás | → : Inclinar Frente</p>
    </div>
    
    <div id="placar">Distância: 0m</div>

    <div id="canvas-container"></div>

    <script>
        // Módulos principais do Matter.js
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Vector, Events } = Matter;

        // --- CONFIGURAÇÃO INICIAL ---
        const larguraCanvas = 1200;
        const alturaCanvas = 600;
        const offsetCamera = { x: larguraCanvas / 3, y: alturaCanvas / 2 }; // Posição fixa da moto na tela

        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 1.2; // Gravidade mais forte para física arcade

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: larguraCanvas,
                height: alturaCanvas,
                wireframes: false, // Desativa wireframes para ver cores
                background: '#20293a',
                hasBounds: true // Necessário para a câmera
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const placar = document.getElementById('placar');

        // --- DEFINIÇÕES DA MOTO ---
        const configMoto = {
            posInicial: { x: 200, y: 400 },
            corpo: { w: 100, h: 25, cor: '#e67e22' }, // Cor laranja do X3M
            roda: { r: 24, cor: '#2c3e50', atrito: 1.0, densidade: 0.005 },
            piloto: { r: 18, cor: '#ecf0f1' }, // Cabeça branca (capacete)
            suspensao: { stiffness: 0.5, length: 15, cor: '#7f8c8d', width: 4 }
        };

        // --- CRIANDO O CENÁRIO (PISTA INFINTA GERADA LOGO) ---
        const configChao = { isStatic: true, friction: 1, render: { fillStyle: '#2ecc71' } };
        const pista = [];
        let fimPistaX = 0;

        // Função para gerar segmentos de pista (Rampas e Planos)
        function gerarPista(numSegmentos, startX, startY) {
            let x = startX;
            let y = startY;

            for (let i = 0; i < numSegmentos; i++) {
                let largura = 300 + Math.random() * 200;
                let inclinacao = (Math.random() - 0.5) * 0.4; // Ângulo em radianos
                
                // Evita rampas muito inclinadas no início
                if (x < 1000) inclinacao = (Math.random() - 0.2) * 0.1;

                // Garante que a moto comece no plano
                if (i === 0) inclinacao = 0;

                const segmento = Bodies.rectangle(
                    x + largura / 2, 
                    y - (Math.sin(inclinacao) * largura) / 2, 
                    largura, 
                    40, 
                    { ...configChao, angle: inclinacao }
                );
                pista.push(segmento);
                Composite.add(world, segmento);

                // Atualiza o ponto final para o próximo segmento
                x += Math.cos(inclinacao) * largura;
                y -= Math.sin(inclinacao) * largura;
            }
            fimPistaX = x;
        }

        // Gera a pista inicial (40 segmentos)
        gerarPista(40, 0, 550);

        // --- CRIANDO A MOTO E O PILOTO ---
        // 1. O Corpo (Chassi)
        const chassi = Bodies.rectangle(configMoto.posInicial.x, configMoto.posInicial.y, configMoto.corpo.w, configMoto.corpo.h, {
            collisionFilter: { group: -1 }, // Impede que as rodas colidam com o chassi
            render: { fillStyle: configMoto.corpo.cor }
        });

        // 2. O Piloto (Apenas Cabeça para simplicidade visual)
        const piloto = Bodies.circle(configMoto.posInicial.x, configMoto.posInicial.y - 45, configMoto.piloto.r, {
            collisionFilter: { group: -1 },
            render: { fillStyle: configMoto.piloto.cor, strokeStyle: '#34495e', lineWidth: 3 }
        });

        // 3. As Rodas (Círculos com alta tração)
        const rodaOpcoes = { 
            friction: configMoto.roda.atrito, 
            density: configMoto.roda.densidade, 
            collisionFilter: { group: -1 },
            render: { fillStyle: configMoto.roda.cor }
        };
        const rodaTraseira = Bodies.circle(configMoto.posInicial.x - 45, configMoto.posInicial.y + 25, configMoto.roda.r, rodaOpcoes);
        const rodaDianteira = Bodies.circle(configMoto.posInicial.x + 45, configMoto.posInicial.y + 25, configMoto.roda.r, rodaOpcoes);

        // 4. A Suspensão (Uniões elásticas)
        const suspTraseira = Constraint.create({
            bodyA: chassi, bodyB: rodaTraseira,
            pointA: { x: -45, y: configMoto.corpo.h / 2 },
            stiffness: configMoto.suspensao.stiffness, length: configMoto.suspensao.length,
            render: { strokeStyle: configMoto.suspensao.cor, lineWidth: configMoto.suspensao.width }
        });

        const suspDianteira = Constraint.create({
            bodyA: chassi, bodyB: rodaDianteira,
            pointA: { x: 45, y: configMoto.corpo.h / 2 },
            stiffness: configMoto.suspensao.stiffness, length: configMoto.suspensao.length,
            render: { strokeStyle: configMoto.suspensao.cor, lineWidth: configMoto.suspensao.width }
        });

        // 5. Conexão Piloto-Moto
        const pesoco = Constraint.create({
            bodyA: chassi, bodyB: piloto,
            pointA: { x: 0, y: -20 },
            stiffness: 0.1, length: 15, // Mais solto para balançar
            render: { visible: false }
        });

        // Adiciona todos os componentes da moto ao mundo
        Composite.add(world, [chassi, piloto, rodaTraseira, rodaDianteira, suspTraseira, suspDianteira, pesoco]);

        // --- CONTROLES E MECÂNICA DO JOGO ---
        const teclas = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => teclas[e.code] = true);
        window.addEventListener('keyup', (e) => teclas[e.code] = false);

        // Função principal de atualização do jogo (Game Loop)
        Events.on(engine, 'beforeUpdate', function() {
            
            // 1. Torque do Motor (Tração Traseira)
            const velocidadeAlvoRoda = 0.4; // Força do motor
            if (teclas['ArrowUp']) {
                Body.setAngularVelocity(rodaTraseira, velocidadeAlvoRoda);
            }
            if (teclas['ArrowDown']) {
                Body.setAngularVelocity(rodaTraseira, -velocidadeAlvoRoda / 2); // Ré/Freio
            }

            // 2. Controle de Ar (Flips) - Aplica torque ao Chassi
            const forcaFlip = 0.08;
            if (teclas['ArrowLeft']) {
                Body.setAngularVelocity(chassi, -forcaFlip);
            }
            if (teclas['ArrowRight']) {
                Body.setAngularVelocity(chassi, forcaFlip);
            }

            // 3. Atualizar Câmera Dinâmica (Segue a Moto)
            render.bounds.min.x = chassi.position.x - offsetCamera.x;
            render.bounds.max.x = chassi.position.x + (larguraCanvas - offsetCamera.x);
            // Câmera vertical segue a moto ligeiramente mais devagar
            render.bounds.min.y = chassi.position.y * 0.8 - offsetCamera.y;
            render.bounds.max.y = chassi.position.y * 0.8 + (alturaCanvas - offsetCamera.y);

            // 4. Atualizar Placar e Gerar mais pista
            placar.innerText = `Distância: ${Math.floor(chassi.position.x / 100)}m`;
            if (chassi.position.x > fimPistaX - larguraCanvas * 2) {
                gerarPista(20, fimPistaX, pista[pista.length - 1].position.y);
            }

            // 5. Condição de Reinício (Abismo ou Capotamento)
            // Se o piloto tocar o chão ou a moto cair muito fundo
            const toquePilotoChao = Matter.Query.collides(piloto, pista).length > 0;
            if (chassi.position.y > 2000 || toquePilotoChao) {
                alert(`Fim de Jogo!\nDistância total: ${Math.floor(chassi.position.x / 100)}m`);
                reiniciarJogo();
            }
        });

        function reiniciarJogo() {
            Body.setPosition(chassi, configMoto.posInicial);
            Body.setVelocity(chassi, { x: 0, y: 0 });
            Body.setAngularVelocity(chassi, 0);

            Body.setPosition(piloto, { x: configMoto.posInicial.x, y: configMoto.posInicial.y - 45 });
            Body.setVelocity(piloto, { x: 0, y: 0 });
            Body.setAngularVelocity(piloto, 0);

            Body.setPosition(rodaTraseira, { x: configMoto.posInicial.x - 45, y: configMoto.posInicial.y + 25 });
            Body.setVelocity(rodaTraseira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaTraseira, 0);

            Body.setPosition(rodaDianteira, { x: configMoto.posInicial.x + 45, y: configMoto.posInicial.y + 25 });
            Body.setVelocity(rodaDianteira, { x: 0, y: 0 });
            Body.setAngularVelocity(rodaDianteira, 0);
        }

    </script>
</body>
