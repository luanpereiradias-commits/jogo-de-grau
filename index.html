<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner - Gráficos Premium</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      border: 6px solid #1a1a1a;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0, 255, 120, 0.5);
    }
    #hud {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      text-align: center;
      text-shadow: 0 3px 12px black;
      z-index: 10;
    }
    #score { font-size: 32px; font-weight: bold; }
    #level { font-size: 20px; color: #ffd700; margin-top: 5px; }
  </style>
</head>
<body>
  <div id="hud">
    <div>Distância: <span id="score">0</span>m</div>
    <div id="level">Nível 1</div>
  </div>
  <canvas id="gameCanvas" width="950" height="520"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");

    let bikeX = 130;
    let bikeY = 355;
    let bikeSpeed = 7;
    let velocityY = 0;
    let gravity = 0.82;
    let isJumping = false;
    let score = 0;
    let gameTime = 0;
    let level = 1;
    let gameOver = false;
    let wheelAngle = 0;
    let cloudOffset = 0;

    let obstacles = [];
    let particles = [];
    let lastObstacle = 0;

    let keys = {};

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    function createParticles(x, y) {
      for (let i = 0; i < 8; i++) {
        particles.push({
          x: x + 20,
          y: y + 42,
          vx: -bikeSpeed * 0.5 - Math.random() * 4,
          vy: -Math.random() * 3 - 1,
          life: 30,
          size: Math.random() * 7 + 4
        });
      }
    }

    function drawBackground() {
      // Céu
      const sky = ctx.createLinearGradient(0, 0, 0, 300);
      sky.addColorStop(0, "#0a4d8c");
      sky.addColorStop(1, "#7cc7ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, 380);

      // Sol com brilho
      ctx.fillStyle = "rgba(255, 230, 80, 0.9)";
      ctx.beginPath();
      ctx.arc(750, 130, 55, 0, Math.PI * 2);
      ctx.fill();

      // Nuvens
      cloudOffset = (cloudOffset + 0.3) % (canvas.width + 200);
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      for (let i = 0; i < 4; i++) {
        let x = (i * 280 + cloudOffset) % (canvas.width + 300) - 100;
        ctx.beginPath();
        ctx.ellipse(x + 60, 80 + i * 25, 55, 25, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + 90, 75 + i * 25, 45, 28, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Montanhas (camadas)
      ctx.fillStyle = "#1e5f3a";
      ctx.beginPath();
      ctx.moveTo(0, 380);
      ctx.lineTo(220, 180);
      ctx.lineTo(480, 380);
      ctx.fill();

      ctx.fillStyle = "#245c38";
      ctx.beginPath();
      ctx.moveTo(150, 380);
      ctx.lineTo(520, 140);
      ctx.lineTo(780, 380);
      ctx.fill();

      // Vegetação distante
      ctx.fillStyle = "#1e4d2a";
      ctx.fillRect(0, 340, canvas.width, 45);

      // Estrada com gradiente
      const road = ctx.createLinearGradient(0, 380, 0, 520);
      road.addColorStop(0, "#2a2a2a");
      road.addColorStop(1, "#1a1a1a");
      ctx.fillStyle = road;
      ctx.fillRect(0, 380, canvas.width, 140);

      // Linhas da estrada
      ctx.strokeStyle = "#ffeb3b";
      ctx.lineWidth = 9;
      for (let i = -60; i < canvas.width + 100; i += 85) {
        let pos = (i - (score * 2.8 % 85));
        ctx.beginPath();
        ctx.moveTo(pos, 425);
        ctx.lineTo(pos + 48, 425);
        ctx.stroke();
      }
    }

    function drawBike() {
      wheelAngle += bikeSpeed * 0.14;

      // Sombra forte
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(bikeX + 12, bikeY + 48, 78, 18);

      // Corpo da moto
      ctx.fillStyle = "#e63939";
      ctx.fillRect(bikeX + 12, bikeY + 15, 82, 32);

      // Detalhes metálicos
      ctx.fillStyle = "#eeeeee";
      ctx.fillRect(bikeX + 22, bikeY + 22, 65, 10);

      // Rodas
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 21;
      ctx.beginPath(); ctx.arc(bikeX + 25, bikeY + 48, 19, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(bikeX + 82, bikeY + 48, 19, 0, Math.PI * 2); ctx.stroke();

      // Aros com rotação
      ctx.strokeStyle = "#ddd";
      ctx.lineWidth = 8;
      ctx.save();
      ctx.translate(bikeX + 25, bikeY + 48);
      ctx.rotate(wheelAngle);
      ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(bikeX + 82, bikeY + 48);
      ctx.rotate(wheelAngle);
      ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // Guidão
      ctx.strokeStyle = "#1a1a1a";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(bikeX + 72, bikeY + 22);
      ctx.quadraticCurveTo(bikeX + 95, bikeY + 8, bikeX + 105, bikeY - 12);
      ctx.stroke();

      // Piloto
      ctx.fillStyle = "#1f1f1f";
      ctx.fillRect(bikeX + 42, bikeY - 12, 32, 28);
      ctx.fillStyle = "#ffdbac";
      ctx.fillRect(bikeX + 48, bikeY - 25, 22, 20);
      ctx.fillStyle = "#111";
      ctx.fillRect(bikeX + 47, bikeY - 30, 24, 14);
    }

    function drawObstacle(obs) {
      ctx.save();
      ctx.translate(obs.x, obs.y);

      if (obs.type === "rock") {
        ctx.fillStyle = "#4a4a4a";
        ctx.beginPath();
        ctx.ellipse(26, 30, 28, 22, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#333";
        ctx.beginPath();
        ctx.ellipse(18, 26, 13, 11, 0.4, 0, Math.PI * 2);
        ctx.fill();
      } 
      else if (obs.type === "barrel") {
        ctx.fillStyle = "#c8102e";
        ctx.fillRect(10, 12, 38, 48);
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(10, 28, 38, 9);
      } 
      else if (obs.type === "log") {
        ctx.fillStyle = "#8d5f2e";
        ctx.fillRect(8, 24, 52, 22);
        ctx.fillStyle = "#6b4420";
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(12 + i*11, 27, 6, 15);
        }
      } 
      else if (obs.type === "box") {
        ctx.fillStyle = "#b97a3d";
        ctx.fillRect(12, 18, 40, 40);
        ctx.fillStyle = "#8b5a2b";
        ctx.fillRect(18, 24, 28, 8);
      }

      ctx.restore();
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.globalAlpha = p.life / 30;
        ctx.fillStyle = "#bbbbbb";
        ctx.fillRect(p.x, p.y, p.size, p.size);
        
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vy += 0.28;
        
        if (p.life <= 0) particles.splice(i, 1);
      }
      ctx.globalAlpha = 1;
    }

    function update() {
      if (gameOver) return;

      gameTime++;

      if (gameTime % 240 === 0) {
        bikeSpeed += 0.5;
        level = Math.floor(bikeSpeed / 3.8) + 1;
        levelEl.textContent = `Nível ${level}`;
      }
      if (bikeSpeed > 28) bikeSpeed = 28;

      if (keys["ArrowRight"]) bikeSpeed = Math.min(bikeSpeed + 0.45, 30);
      if (keys["ArrowLeft"]) bikeSpeed = Math.max(bikeSpeed - 0.6, 5);

      if ((keys[" "] || keys["ArrowUp"]) && !isJumping) {
        velocityY = -20;
        isJumping = true;
      }

      velocityY += gravity;
      bikeY += velocityY;

      if (bikeY >= 355) {
        bikeY = 355;
        velocityY = 0;
        isJumping = false;
      }

      if (Date.now() - lastObstacle > Math.max(550, 1500 - level * 90)) {
        const types = ["rock", "barrel", "log", "box"];
        obstacles.push({
          x: canvas.width + 40,
          y: 340 + Math.random() * 18 - 9,
          type: types[Math.floor(Math.random() * 4)],
          width: 52,
          height: 50
        });
        lastObstacle = Date.now();
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= bikeSpeed;

        const o = obstacles[i];
        if (o.x < bikeX + 88 && o.x + o.width > bikeX + 18 && bikeY + 48 > o.y) {
          gameOver = true;
        }

        if (o.x < -100) obstacles.splice(i, 1);
      }

      if (Math.random() < 0.7) createParticles(bikeX + 20, bikeY);
      score += Math.floor(bikeSpeed / 3);
      scoreEl.textContent = score;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      obstacles.forEach(drawObstacle);
      drawBike();
      drawParticles();

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.88)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "bold 68px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, 210);
        
        ctx.font = "34px Arial";
        ctx.fillText(`Distância: ${score}m`, canvas.width/2, 290);
        ctx.fillText(`Nível: ${level}`, canvas.width/2, 335);
        ctx.fillText("Pressione F5 para jogar novamente", canvas.width/2, 400);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>

  <p style="position:absolute;bottom:18px;color:#bbb;text-align:center;width:100%;font-size:15px;">
    ← → : Velocidade | ESPAÇO ou ↑ : Pular
  </p>
</body>
</html>
