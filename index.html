<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      border: 5px solid #222;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 255, 100, 0.4);
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      text-align: center;
      text-shadow: 0 2px 10px black;
    }
    #score { font-size: 28px; font-weight: bold; }
    #level { font-size: 18px; color: #ffd700; }
  </style>
</head>
<body>
  <div id="hud">
    <div>Distância: <span id="score">0</span>m</div>
    <div id="level">Nível 1</div>
  </div>
  <canvas id="gameCanvas" width="900" height="500"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");

    let bikeX = 120;
    let bikeY = 340;
    let bikeSpeed = 7;
    let velocityY = 0;
    let gravity = 0.85;
    let isJumping = false;
    let score = 0;
    let gameTime = 0;
    let level = 1;
    let gameOver = false;
    let wheelAngle = 0;

    let obstacles = [];
    let particles = [];
    let lastObstacle = 0;

    let keys = {};

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    function createParticles(x, y) {
      for (let i = 0; i < 7; i++) {
        particles.push({
          x: x + 15,
          y: y + 40,
          vx: -bikeSpeed * 0.4 - Math.random() * 3,
          vy: -1.5 - Math.random() * 2,
          life: 28
        });
      }
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, 300);
      grad.addColorStop(0, "#1e90ff");
      grad.addColorStop(1, "#87ceeb");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, 380);

      ctx.fillStyle = "#ffeb3b";
      ctx.beginPath();
      ctx.arc(720, 110, 48, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#2e8b57";
      ctx.beginPath();
      ctx.moveTo(0, 380);
      ctx.lineTo(180, 190);
      ctx.lineTo(420, 380);
      ctx.lineTo(620, 230);
      ctx.lineTo(900, 380);
      ctx.fill();

      ctx.fillStyle = "#333";
      ctx.fillRect(0, 380, canvas.width, 120);

      ctx.fillStyle = "#1e5c1e";
      ctx.fillRect(0, 370, canvas.width, 15);

      ctx.strokeStyle = "#ffeb3b";
      ctx.lineWidth = 8;
      for (let i = -50; i < canvas.width + 50; i += 80) {
        let pos = (i - (score * 2 % 80));
        ctx.beginPath();
        ctx.moveTo(pos, 415);
        ctx.lineTo(pos + 45, 415);
        ctx.stroke();
      }
    }

    function drawBike() {
      wheelAngle += bikeSpeed * 0.13;

      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.fillRect(bikeX + 15, bikeY + 48, 70, 14);

      ctx.fillStyle = "#e63939";
      ctx.fillRect(bikeX + 10, bikeY + 12, 78, 30);

      ctx.fillStyle = "#ddd";
      ctx.fillRect(bikeX + 18, bikeY + 20, 60, 9);

      // Rodas
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 19;
      ctx.beginPath(); ctx.arc(bikeX + 22, bikeY + 47, 18, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(bikeX + 78, bikeY + 47, 18, 0, Math.PI * 2); ctx.stroke();

      ctx.strokeStyle = "#ddd";
      ctx.lineWidth = 7;
      ctx.save();
      ctx.translate(bikeX + 22, bikeY + 47);
      ctx.rotate(wheelAngle);
      ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(bikeX + 78, bikeY + 47);
      ctx.rotate(wheelAngle);
      ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      ctx.strokeStyle = "#222";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(bikeX + 70, bikeY + 20);
      ctx.quadraticCurveTo(bikeX + 88, bikeY + 8, bikeX + 98, bikeY - 10);
      ctx.stroke();

      ctx.fillStyle = "#222";
      ctx.fillRect(bikeX + 38, bikeY - 15, 30, 27);
      ctx.fillStyle = "#ffdbac";
      ctx.fillRect(bikeX + 44, bikeY - 28, 20, 20);
      ctx.fillStyle = "#111";
      ctx.fillRect(bikeX + 43, bikeY - 33, 23, 13);
    }

    // ==================== NOVOS OBSTÁCULOS ====================
    function drawObstacle(obs) {
      ctx.save();
      ctx.translate(obs.x, obs.y);

      if (obs.type === "rock") {
        ctx.fillStyle = "#555";
        ctx.beginPath();
        ctx.ellipse(24, 32, 26, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#444";
        ctx.beginPath();
        ctx.ellipse(18, 28, 12, 10, 0.3, 0, Math.PI * 2);
        ctx.fill();
      } 
      else if (obs.type === "barrel") {
        ctx.fillStyle = "#c8102e";
        ctx.fillRect(8, 10, 32, 45);
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(8, 22, 32, 8);
        ctx.fillStyle = "#222";
        ctx.fillRect(12, 15, 24, 6);
      } 
      else if (obs.type === "log") {
        ctx.fillStyle = "#8d5524";
        ctx.fillRect(5, 25, 45, 18);
        ctx.fillStyle = "#6b3e1a";
        ctx.fillRect(8, 28, 39, 5);
      } 
      else if (obs.type === "box") {
        ctx.fillStyle = "#8b5a2b";
        ctx.fillRect(10, 18, 35, 35);
        ctx.fillStyle = "#5c3a1f";
        ctx.fillRect(15, 23, 25, 8);
        ctx.fillRect(15, 38, 25, 6);
      }

      ctx.restore();
    }

    function drawObstacles() {
      for (let obs of obstacles) {
        drawObstacle(obs);
      }
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.globalAlpha = p.life / 28;
        ctx.fillStyle = "#aaa";
        ctx.fillRect(p.x, p.y, 7, 7);
        
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vy += 0.25;
        
        if (p.life <= 0) particles.splice(i, 1);
      }
      ctx.globalAlpha = 1;
    }

    function update() {
      if (gameOver) return;

      gameTime++;

      if (gameTime % 260 === 0) {
        bikeSpeed += 0.48;
        level = Math.floor(bikeSpeed / 3.6) + 1;
        levelEl.textContent = `Nível ${level}`;
      }
      if (bikeSpeed > 27) bikeSpeed = 27;

      if (keys["ArrowRight"]) bikeSpeed = Math.min(bikeSpeed + 0.4, 29);
      if (keys["ArrowLeft"]) bikeSpeed = Math.max(bikeSpeed - 0.5, 5);

      if ((keys[" "] || keys["ArrowUp"]) && !isJumping) {
        velocityY = -19.5;
        isJumping = true;
      }

      velocityY += gravity;
      bikeY += velocityY;

      if (bikeY >= 340) {
        bikeY = 340;
        velocityY = 0;
        isJumping = false;
      }

      // Gerar obstáculos variados
      if (Date.now() - lastObstacle > Math.max(600, 1550 - level * 85)) {
        const types = ["rock", "barrel", "log", "box"];
        obstacles.push({
          x: canvas.width + 30,
          y: 335 + Math.random() * 12 - 6, // pequena variação de altura
          type: types[Math.floor(Math.random() * types.length)],
          width: 45,
          height: 48
        });
        lastObstacle = Date.now();
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= bikeSpeed;

        const obs = obstacles[i];
        if (
          obs.x < bikeX + 85 &&
          obs.x + obs.width > bikeX + 15 &&
          bikeY + 45 > obs.y
        ) {
          gameOver = true;
        }

        if (obs.x < -80) obstacles.splice(i, 1);
      }

      if (Math.random() < 0.65) createParticles(bikeX + 18, bikeY);
      score += Math.floor(bikeSpeed / 3);
      scoreEl.textContent = score;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawObstacles();
      drawBike();
      drawParticles();

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "bold 62px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, 200);
        
        ctx.font = "32px Arial";
        ctx.fillText(`Distância: ${score}m`, canvas.width/2, 270);
        ctx.fillText(`Nível alcançado: ${level}`, canvas.width/2, 315);
        ctx.fillText("Pressione F5 para reiniciar", canvas.width/2, 380);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>

  <p style="position:absolute;bottom:15px;color:#ccc;text-align:center;width:100%;font-size:14px;">
    ← → : Velocidade | ESPAÇO ou ↑ : Pular
  </p>
</body>
</html>
