<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Grau X3M</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 24px; text-shadow: 2px 2px #000; }
        .score { font-size: 20px; color: #ffcc00; font-weight: bold; }
        .controles {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff3333;
        }
        button {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
        }
        button:hover { background: #ffa500; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="canvas-container">
        <div id="ui">
            <h1>MOTO GRAU X3M</h1>
            <div class="score">Pontos de Grau: <span id="score-val">0</span></div>
            <div id="status" style="color: #00ffcc;">No chão</div>
        </div>

        <div class="controles">
            <strong>Controles:</strong> Seta Direita (Acelerar) | Seta Esquerda (Freiar/Empinar) | Seta Cima (Inclinar p/ Frente)
        </div>

        <div id="game-over">
            <h2>🚨 CAIU EXTREMO! 🚨</h2>
            <p>Você raspou a placa ou a cabeça no chão!</p>
            <p>Pontuação final: <span id="final-score">0</span></p>
            <button onclick="restartGame()">Tentar Novamente</button>
        </div>
    </div>

    <script>
        // Módulos do Matter.js
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Vector } = Matter;

        let engine, render, runner;
        let moto, rodaTraseira, rodaDianteira;
        let chassi, restTraseira, restDianteira;
        let keys = {};
        let score = 0;
        let gameActive = true;

        function init() {
            // 1. Criar o Motor Físico
            engine = Engine.create({ gravity: { y: 1.4 } }); // Gravidade um pouco mais pesada estilo arcade

            // 2. Criar o Renderizador
            render = Render.create({
                element: document.getElementById('canvas-container'),
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false, // Define como false para ver cores e formas preenchidas
                    background: '#222'
                }
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            gerarCenario();
            criarMoto(200, window.innerHeight - 200);

            // Loop do jogo para checar o Grau e Pontuação
            Matter.Events.on(engine, 'afterUpdate', atualizarJogo);
        }

        function gerarCenario() {
            // Chão infinito simplificado (uma longa plataforma com lombadas)
            let chao = Bodies.rectangle(4000, window.innerHeight - 20, 9000, 40, { 
                isStatic: true, 
                render: { fillStyle: '#333' } 
            });
            
            // Adicionando algumas rampas/lombadas estilo X3M
            let rampa1 = Bodies.rectangle(800, window.innerHeight - 40, 200, 40, { isStatic: true, angle: -0.2, render: { fillStyle: '#555' } });
            let rampa2 = Bodies.rectangle(1500, window.innerHeight - 50, 300, 60, { isStatic: true, angle: -0.4, render: { fillStyle: '#555' } });
            let rampa3 = Bodies.rectangle(2500, window.innerHeight - 40, 200, 40, { isStatic: true, angle: 0.3, render: { fillStyle: '#555' } });

            Composite.add(engine.world, [chao, rampa1, rampa2, rampa3]);
        }

        function criarMoto(x, y) {
            // Chassi da moto (Corpo principal)
            chassi = Bodies.rectangle(x, y, 90, 20, {
                collisionFilter: { group: -1 }, // Evita colisão entre as partes da própria moto
                render: { fillStyle: '#ff3333' },
                density: 0.005
            });

            // Rodas
            rodaTraseira = Bodies.circle(x - 45, y + 25, 25, {
                collisionFilter: { group: -1 },
                friction: 0.8,
                render: { fillStyle: '#111', strokeStyle: '#fff', lineWidth: 4 }
            });

            rodaDianteira = Bodies.circle(x + 45, y + 25, 25, {
                collisionFilter: { group: -1 },
                friction: 0.8,
                render: { fillStyle: '#111', strokeStyle: '#fff', lineWidth: 4 }
            });

            // Suspensão (Molas conectando as rodas ao chassi)
            restTraseira = Constraint.create({
                bodyA: chassi, pointA: { x: -40, y: 15 },
                bodyB: rodaTraseira,
                stiffness: 0.4, damping: 0.1,
                render: { visible: true, strokeStyle: '#999' }
            });

            restDianteira = Constraint.create({
                bodyA: chassi, pointA: { x: 40, y: 15 },
                bodyB: rodaDianteira,
                stiffness: 0.4, damping: 0.1,
                render: { visible: true, strokeStyle: '#999' }
            });

            Composite.add(engine.world, [chassi, rodaTraseira, rodaDianteira, restTraseira, restDianteira]);
        }

        // Captura de Teclado
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function atualizarJogo() {
            if (!gameActive) return;

            // Centralizar a câmera na moto
            Render.lookAt(render, {
                min: { x: chassi.position.x - window.innerWidth / 3, y: chassi.position.y - window.innerHeight / 1.5 },
                max: { x: chassi.position.x + window.innerWidth / 1.5, y: chassi.position.y + window.innerHeight / 3 }
            });

            // --- CONTROLES DA MOTO ---
            // Seta Direita: Acelera (Aplica torque na roda traseira)
            if (keys['ArrowRight']) {
                Body.setAngularVelocity(rodaTraseira, 0.3);
            }
            
            // Seta Esquerda: Freia e joga o peso para trás (Empina / Dá Grau)
            if (keys['ArrowLeft']) {
                Body.setAngularVelocity(rodaTraseira, -0.05); // Freio traseiro
                Body.applyForce(chassi, { x: chassi.position.x, y: chassi.position.y }, { x: -0.005, y: -0.02 }); // Força para empinar
                Body.setAngularVelocity(chassi, -0.06); // Inclina para trás
            }

            // Seta para Cima: Inclina para frente (Corta o grau / corrige no ar)
            if (keys['ArrowUp']) {
                Body.setAngularVelocity(chassi, 0.05);
            }

            // --- LÓGICA DO GRAU (WHEELIE) ---
            // Verifica a altura das rodas para saber se a dianteira está no ar e a traseira no chão
            let diferencaAltura = rodaTraseira.position.y - rodaDianteira.position.y;
            let angulo = chassi.angle;

            // Se a roda dianteira estiver bem mais alta que a traseira (Empinado)
            if (diferencaAltura > 25 && angulo < -0.2 && angulo > -1.5) {
                score += 1;
                document.getElementById('score-val').innerText = score;
                document.getElementById('status').innerText = "🔥 DANDO GRAU! 🔥";
                document.getElementById('status').style.color = "#ffcc00";
            } else {
                document.getElementById('status').innerText = "Correndo...";
                document.getElementById('status').style.color = "#00ffcc";
            }

            // --- CONDIÇÃO DE DERROTA (GAME OVER) ---
            // Se o chassi capotar demais ou encostar no chão (ângulo muito inclinado)
            if (angulo < -1.7 || angulo > 1.5) {
                gameOver();
