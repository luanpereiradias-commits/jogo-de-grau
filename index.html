<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner - Velocidade Crescente</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(0,255,0,0.3);
    }
    #info {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 22px;
      text-shadow: 2px 2px 4px black;
    }
    #level {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffcc00;
      font-size: 18px;
      text-shadow: 2px 2px 4px black;
    }
  </style>
</head>
<body>
  <div id="info">Distância: <span id="score">0</span>m</div>
  <div id="level">Nível 1</div>
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const levelElement = document.getElementById("level");

    let bikeX = 100;
    let bikeY = 280;
    let bikeSpeed = 6;           // Velocidade inicial
    let velocityY = 0;
    let gravity = 0.8;
    let isJumping = false;
    let score = 0;
    let gameTime = 0;
    let level = 1;
    let gameOver = false;

    let obstacles = [];
    let lastObstacle = 0;

    let keys = {};

    window.addEventListener("keydown", (e) => keys[e.key] = true);
    window.addEventListener("keyup", (e) => keys[e.key] = false);

    function drawBike() {
      ctx.fillStyle = "#ff0000";
      ctx.fillRect(bikeX, bikeY, 60, 25);
      
      ctx.fillStyle = "#333";
      ctx.beginPath();
      ctx.arc(bikeX + 10, bikeY + 30, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bikeX + 50, bikeY + 30, 15, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#000";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(bikeX + 45, bikeY + 10);
      ctx.lineTo(bikeX + 55, bikeY - 5);
      ctx.stroke();

      ctx.fillStyle = "#00aaff";
      ctx.fillRect(bikeX + 25, bikeY - 15, 20, 20);
    }

    function drawGround() {
      ctx.fillStyle = "#228B22";
      ctx.fillRect(0, 340, canvas.width, 60);
      
      ctx.fillStyle = "#FFD700";
      for (let i = 0; i < canvas.width + 60; i += 60) {
        ctx.fillRect((i - (score % 60)) % (canvas.width + 60), 355, 30, 8);
      }
    }

    function drawObstacles() {
      ctx.fillStyle = "#8B4513";
      for (let obs of obstacles) {
        ctx.fillRect(obs.x, obs.y, 40, 50);
      }
    }

    function update() {
      if (gameOver) return;

      gameTime++;

      // === AUMENTO DE VELOCIDADE AO LONGO DO TEMPO ===
      if (gameTime % 300 === 0) {        // A cada ~5 segundos (60fps)
        bikeSpeed += 0.4;
        level = Math.floor(bikeSpeed / 3) + 1;
        levelElement.textContent = `Nível ${level}`;
      }

      // Limitar velocidade máxima
      if (bikeSpeed > 22) bikeSpeed = 22;

      // Controles do jogador
      if (keys["ArrowRight"]) bikeSpeed = Math.min(bikeSpeed + 0.3, 24);
      if (keys["ArrowLeft"]) bikeSpeed = Math.max(bikeSpeed - 0.4, 5);

      // Pular
      if ((keys[" "] || keys["ArrowUp"]) && !isJumping) {
        velocityY = -18;
        isJumping = true;
      }

      velocityY += gravity;
      bikeY += velocityY;

      if (bikeY >= 280) {
        bikeY = 280;
        velocityY = 0;
        isJumping = false;
      }

      // Gerar obstáculos (fica mais rápido com o nível)
      const spawnRate = Math.max(800, 1400 - level * 80);
      if (Date.now() - lastObstacle > spawnRate) {
        obstacles.push({ x: canvas.width, y: 290 });
        lastObstacle = Date.now();
      }

      // Mover obstáculos
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= bikeSpeed;

        // Colisão
        if (
          obstacles[i].x < bikeX + 55 &&
          obstacles[i].x + 40 > bikeX + 10 &&
          bikeY + 40 > obstacles[i].y
        ) {
          gameOver = true;
        }

        if (obstacles[i].x < -50) obstacles.splice(i, 1);
      }

      score += Math.floor(bikeSpeed / 3);
      scoreElement.textContent = score;
    }

    function draw() {
      ctx.fillStyle = "#87CEEB";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGround();
      drawObstacles();
      drawBike();

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "bold 55px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, 160);
        
        ctx.font = "30px Arial";
        ctx.fillText(`Distância final: ${score}m`, canvas.width/2, 220);
        ctx.fillText(`Nível alcançado: ${level}`, canvas.width/2, 260);
        ctx.fillText("Pressione F5 para jogar novamente", canvas.width/2, 320);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>

  <p style="position:absolute;bottom:10px;color:#aaa;text-align:center;width:100%;">
    ← → : Ajustar velocidade | ESPAÇO ou ↑ : Pular
  </p>
</body>
</html>
