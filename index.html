<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(0,255,0,0.3);
    }
    #info {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 20px;
      text-shadow: 2px 2px 4px black;
    }
  </style>
</head>
<body>
  <div id="info">Distância: <span id="score">0</span>m</div>
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    // Variáveis do jogo
    let bikeX = 100;
    let bikeY = 280;
    let bikeSpeed = 8;
    let velocityY = 0;
    let gravity = 0.8;
    let isJumping = false;
    let score = 0;
    let gameOver = false;

    // Obstáculos
    let obstacles = [];
    let lastObstacle = 0;

    // Controles
    let keys = {};

    window.addEventListener("keydown", (e) => keys[e.key] = true);
    window.addEventListener("keyup", (e) => keys[e.key] = false);

    // Desenhar moto (simples)
    function drawBike() {
      // Corpo da moto
      ctx.fillStyle = "#ff0000";
      ctx.fillRect(bikeX, bikeY, 60, 25);           // corpo
      
      // Roda traseira
      ctx.fillStyle = "#333";
      ctx.beginPath();
      ctx.arc(bikeX + 10, bikeY + 30, 15, 0, Math.PI * 2);
      ctx.fill();
      
      // Roda dianteira
      ctx.beginPath();
      ctx.arc(bikeX + 50, bikeY + 30, 15, 0, Math.PI * 2);
      ctx.fill();

      // Guidão
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(bikeX + 45, bikeY + 10);
      ctx.lineTo(bikeX + 55, bikeY - 5);
      ctx.stroke();

      // Piloto
      ctx.fillStyle = "#00aaff";
      ctx.fillRect(bikeX + 25, bikeY - 15, 20, 20); // capacete
    }

    // Desenhar chão
    function drawGround() {
      ctx.fillStyle = "#228B22";
      ctx.fillRect(0, 340, canvas.width, canvas.height - 340);
      
      // Faixas da estrada
      ctx.fillStyle = "#FFD700";
      for (let i = 0; i < canvas.width; i += 60) {
        ctx.fillRect(i - (score % 60), 355, 30, 8);
      }
    }

    // Desenhar obstáculos
    function drawObstacles() {
      ctx.fillStyle = "#8B4513";
      for (let obs of obstacles) {
        ctx.fillRect(obs.x, obs.y, 40, 50); // obstáculo (caixa/rocha)
      }
    }

    function update() {
      if (gameOver) return;

      // Acelerar / Desacelerar
      if (keys["ArrowRight"]) bikeSpeed = Math.min(bikeSpeed + 0.2, 15);
      if (keys["ArrowLeft"]) bikeSpeed = Math.max(bikeSpeed - 0.3, 4);

      // Pular
      if ((keys[" "] || keys["ArrowUp"]) && !isJumping) {
        velocityY = -18;
        isJumping = true;
      }

      // Física do pulo
      velocityY += gravity;
      bikeY += velocityY;

      // Colisão com chão
      if (bikeY >= 280) {
        bikeY = 280;
        velocityY = 0;
        isJumping = false;
      }

      // Gerar obstáculos
      if (Date.now() - lastObstacle > 1200) {
        obstacles.push({
          x: canvas.width,
          y: 290
        });
        lastObstacle = Date.now();
      }

      // Mover obstáculos
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= bikeSpeed;

        // Colisão
        if (
          obstacles[i].x < bikeX + 60 &&
          obstacles[i].x + 40 > bikeX &&
          obstacles[i].y < bikeY + 40 &&
          obstacles[i].y + 50 > bikeY
        ) {
          gameOver = true;
        }

        // Remover obstáculos fora da tela
        if (obstacles[i].x < -50) {
          obstacles.splice(i, 1);
        }
      }

      score += Math.floor(bikeSpeed / 2);
      scoreElement.textContent = score;
    }

    function draw() {
      // Limpar tela
      ctx.fillStyle = "#87CEEB";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGround();
      drawObstacles();
      drawBike();

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "bold 50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 30);
        
        ctx.font = "30px Arial";
        ctx.fillText(`Distância: ${score}m`, canvas.width/2, canvas.height/2 + 30);
        ctx.fillText("Pressione F5 para jogar novamente", canvas.width/2, canvas.height/2 + 80);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Iniciar jogo
    gameLoop();
  </script>

  <p style="position:absolute;bottom:10px;color:#aaa;text-align:center;width:100%;">
    ← → : Velocidade | ESPAÇO ou ↑ : Pular
  </p>
</body>
</html>
