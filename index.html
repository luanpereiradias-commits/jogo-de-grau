<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏍️ Moto Runner - Premium</title>
  <style>
    body { margin:0; padding:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#0a0a0a; font-family:'Arial',sans-serif; overflow:hidden; }
    canvas { border:6px solid #1a1a1a; border-radius:15px; box-shadow:0 0 50px rgba(0,255,120,0.6); }
    #hud { position:absolute; top:25px; left:50%; transform:translateX(-50%); color:white; text-align:center; text-shadow:0 3px 12px black; z-index:10; }
    #score { font-size:38px; font-weight:bold; letter-spacing:2px; }
    #level { font-size:22px; color:#ffd700; margin-top:4px; }
    #restart { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); color:white; padding:20px 40px; border-radius:12px; text-align:center; display:none; z-index:100; }
  </style>
</head>
<body>
  <div id="hud">
    <div>Distância: <span id="score">0</span>m</div>
    <div id="level">Nível 1</div>
  </div>
  <canvas id="gameCanvas" width="950" height="520"></canvas>

  <div id="restart">
    <h2>GAME OVER</h2>
    <p>Distância: <span id="finalScore">0</span>m</p>
    <p>Nível: <span id="finalLevel">1</span></p>
    <button onclick="restartGame()" style="padding:12px 30px; font-size:18px; margin-top:15px; cursor:pointer;">Jogar Novamente (R)</button>
  </div>

  <p style="position:absolute;bottom:18px;color:#bbb;text-align:center;width:100%;font-size:15px;">
    ← → : Velocidade | ESPAÇO ou ↑ : Pular
  </p>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const restartScreen = document.getElementById("restart");
    const finalScoreEl = document.getElementById("finalScore");
    const finalLevelEl = document.getElementById("finalLevel");

    let bikeX = 130, bikeY = 355;
    let bikeSpeed = 7;
    let velocityY = 0;
    let gravity = 0.85;
    let isJumping = false;
    let score = 0;
    let gameTime = 0;
    let level = 1;
    let gameOver = false;
    let wheelAngle = 0;
    let cloudOffset = 0;
    let timeOfDay = 0;

    let obstacles = [];
    let particles = [];
    let exhaustTrails = [];   // ← Novo: rastro do escape
    let lastObstacle = 0;

    let keys = {};

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    function createParticles(x, y) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: x + 25 + Math.random()*15,
          y: y + 48,
          vx: -bikeSpeed * 0.65 - Math.random() * 5,
          vy: -Math.random() * 4 - 1.5,
          life: 38,
          size: Math.random() * 7 + 4
        });
      }
    }

    function createExhaustTrail(x, y) {
      const intensity = Math.min(1, (bikeSpeed - 8) / 18); // quanto mais rápido = mais fogo
      for (let i = 0; i < 3 + intensity * 4; i++) {
        exhaustTrails.push({
          x: x + Math.random() * 6 - 3,
          y: y + Math.random() * 8 - 4,
          vx: -bikeSpeed * 0.6 - Math.random() * 7,
          vy: -Math.random() * 3 - 1,
          life: 22 + intensity * 18,
          size: 6 + intensity * 9,
          hue: 25 + Math.random() * 25   // laranja → amarelo
        });
      }
    }

    function getSkyColor() {
      const t = timeOfDay;
      const r = Math.floor(10 + (43 - 10) * (1-t));
      const g = Math.floor(63 + (11 - 63) * t);
      const b = Math.floor(122 + (45 - 122) * t);
      return `rgb(${r},${g},${b})`;
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, 340);
      sky.addColorStop(0, getSkyColor());
      sky.addColorStop(1, timeOfDay > 0.6 ? "#1a1a4d" : "#6eb8ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, 380);

      const alpha = Math.max(0, 1 - timeOfDay * 1.8);
      if (alpha > 0.08) {
        ctx.fillStyle = `rgba(255,235,100,${alpha})`;
        ctx.beginPath(); ctx.arc(780, 110, 48, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = `rgba(235,245,255,${(timeOfDay-0.5)*3})`;
        ctx.beginPath(); ctx.arc(765, 100, 38, 0, Math.PI*2); ctx.fill();
      }

      cloudOffset = (cloudOffset + 0.35) % (canvas.width + 300);
      ctx.fillStyle = `rgba(255,255,255,${0.9 - timeOfDay*0.65})`;
      for (let i = 0; i < 4; i++) {
        let x = (i*290 + cloudOffset) % (canvas.width + 350) - 120;
        ctx.beginPath(); ctx.ellipse(x+65, 75+i*28, 58, 26, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+105, 70+i*28, 48, 29, 0, 0, Math.PI*2); ctx.fill();
      }

      ctx.fillStyle = timeOfDay > 0.5 ? "#0f2a1f" : "#1e5f3a";
      ctx.beginPath(); ctx.moveTo(0,380); ctx.lineTo(240,165); ctx.lineTo(520,380); ctx.fill();
      ctx.fillStyle = timeOfDay > 0.5 ? "#13261f" : "#245c38";
      ctx.beginPath(); ctx.moveTo(180,380); ctx.lineTo(580,130); ctx.lineTo(850,380); ctx.fill();

      const road = ctx.createLinearGradient(0,380,0,520);
      road.addColorStop(0, timeOfDay > 0.5 ? "#222" : "#333");
      road.addColorStop(1, "#111");
      ctx.fillStyle = road;
      ctx.fillRect(0,380,canvas.width,140);

      ctx.strokeStyle = "#ffeb3b";
      ctx.lineWidth = 10;
      for (let i = -80; i < canvas.width + 120; i += 95) {
        let pos = i - (score * 2.9 % 95);
        ctx.beginPath();
        ctx.moveTo(pos, 425);
        ctx.lineTo(pos + 55, 425);
        ctx.stroke();
      }
    }

    function drawBike() {
      wheelAngle += bikeSpeed * 0.17;
      const x = bikeX;
      const y = bikeY;

      // Sombra
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(x + 15, y + 49, 88, 17);

      // Corpo da Moto
      const bodyGrad = ctx.createLinearGradient(x+20, y+10, x+80, y+45);
      bodyGrad.addColorStop(0, "#e63939");
      bodyGrad.addColorStop(1, "#9e1f1f");
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(x+25, y+18);
      ctx.quadraticCurveTo(x+45, y+8, x+75, y+15);
      ctx.lineTo(x+95, y+38);
      ctx.lineTo(x+35, y+48);
      ctx.lineTo(x+20, y+30);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.fillRect(x+38, y+18, 38, 8);

      // Motor
      ctx.fillStyle = "#222";
      ctx.fillRect(x+32, y+38, 38, 18);

      // Escape
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 11;
      ctx.beginPath();
      ctx.moveTo(x+35, y+48);
      ctx.quadraticCurveTo(x+15, y+52, x+8, y+58);
      ctx.stroke();

      // === TRAÇO DE VELOCIDADE NO ESCAPE ===
      if (bikeSpeed > 10) {
        createExhaustTrail(x + 8, y + 58);
      }

      // Brilho no escape
      ctx.fillStyle = "#ff8800";
      ctx.fillRect(x+8, y+55, 12, 6);

      // Rodas (mantido)
      ctx.strokeStyle = "#111"; ctx.lineWidth = 24;
      ctx.beginPath(); ctx.arc(x+32, y+48, 19, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+88, y+48, 19, 0, Math.PI*2); ctx.stroke();

      ctx.strokeStyle = "#ddd"; ctx.lineWidth = 8;
      ctx.save(); ctx.translate(x+32, y+48); ctx.rotate(wheelAngle);
      ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.stroke(); ctx.restore();
      ctx.save(); ctx.translate(x+88, y+48); ctx.rotate(wheelAngle);
      ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.stroke(); ctx.restore();

      // Farol
      ctx.fillStyle = "#ffeeaa";
      ctx.beginPath(); ctx.ellipse(x+98, y+22, 12, 10, -0.6, 0, Math.PI*2); ctx.fill();

      // Guidão e Piloto (mantido)
      ctx.strokeStyle = "#1c1c1c"; ctx.lineWidth = 9;
      ctx.beginPath(); ctx.moveTo(x+78, y+20);
      ctx.quadraticCurveTo(x+102, y+6, x+115, y-16); ctx.stroke();

      ctx.fillStyle = "#1a1a1a"; ctx.fillRect(x+48, y-8, 32, 32);
      ctx.fillStyle = "#111";
      ctx.beginPath(); ctx.ellipse(x+62, y-18, 17, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#44aaff";
      ctx.beginPath(); ctx.ellipse(x+66, y-19, 11, 8, 0.3, 0, Math.PI*2); ctx.fill();
    }

    function drawExhaustTrails() {
      for (let i = exhaustTrails.length - 1; i >= 0; i--) {
        let t = exhaustTrails[i];
        const alpha = t.life / 35;
        ctx.globalAlpha = alpha * 0.9;
        ctx.fillStyle = `hsl(${t.hue}, 100%, 65%)`;
        ctx.fillRect(t.x, t.y, t.size, t.size * 0.6);

        t.x += t.vx;
        t.y += t.vy;
        t.vy += 0.18;
        t.life--;
        t.size *= 0.97;

        if (t.life <= 0 || t.size < 1) exhaustTrails.splice(i, 1);
      }
      ctx.globalAlpha = 1;
    }

    function drawObstacle(obs) {
      ctx.save(); ctx.translate(obs.x, obs.y);
      if (obs.type === "rock") {
        ctx.fillStyle = timeOfDay > 0.5 ? "#444" : "#555";
        ctx.beginPath(); ctx.ellipse(26,32,29,23,0,0,Math.PI*2); ctx.fill();
      } else if (obs.type === "barrel") {
        ctx.fillStyle = "#c8102e"; ctx.fillRect(8,10,42,52);
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(8,28,42,10);
      } else if (obs.type === "log") {
        ctx.fillStyle = "#8d5f2e"; ctx.fillRect(6,22,56,26);
      } else if (obs.type === "box") {
        ctx.fillStyle = "#b97a3d"; ctx.fillRect(12,16,42,46);
      }
      ctx.restore();
    }

    function drawParticles() {
      for (let i = particles.length-1; i >= 0; i--) {
        let p = particles[i];
        ctx.globalAlpha = p.life / 38;
        ctx.fillStyle = "#aaa";
        ctx.fillRect(p.x, p.y, p.size, p.size);
        p.x += p.vx; p.y += p.vy; p.vy += 0.32; p.life--;
        if (p.life <= 0) particles.splice(i,1);
      }
      ctx.globalAlpha = 1;
    }

    function update() {
      if (gameOver) return;
      gameTime++;
      timeOfDay = Math.min(1, gameTime / 3200);

      if (gameTime % 280 === 0 && bikeSpeed < 32) {
        bikeSpeed += 0.6;
        level = Math.floor((bikeSpeed - 5) / 3.5) + 1;
        levelEl.textContent = `Nível ${level}`;
      }

      if (keys["ArrowRight"]) bikeSpeed = Math.min(bikeSpeed + 0.5, 34);
      if (keys["ArrowLeft"]) bikeSpeed = Math.max(bikeSpeed - 0.7, 5);

      if ((keys[" "] || keys["ArrowUp"]) && !isJumping) {
        velocityY = -21.5;
        isJumping = true;
      }

      velocityY += gravity;
      bikeY += velocityY;
      if (bikeY >= 355) { bikeY = 355; velocityY = 0; isJumping = false; }

      if (Date.now() - lastObstacle > Math.max(480, 1400 - level*95)) {
        const types = ["rock","barrel","log","box"];
        obstacles.push({ x: canvas.width+50, y: 335 + Math.random()*25, type: types[Math.floor(Math.random()*4)], width:58, height:55 });
        lastObstacle = Date.now();
      }

      for (let i = obstacles.length-1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= bikeSpeed;
        if (o.x < bikeX + 95 && o.x + o.width > bikeX + 15 && bikeY + 55 > o.y && bikeY + 20 < o.y + o.height) {
          gameOver = true;
          finalScoreEl.textContent = score;
          finalLevelEl.textContent = level;
          restartScreen.style.display = "block";
        }
        if (o.x < -100) obstacles.splice(i,1);
      }

      if (Math.random() < 0.78) createParticles(bikeX, bikeY);
      score += Math.floor(bikeSpeed / 2.8);
      scoreEl.textContent = score;
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawBackground();
      obstacles.forEach(drawObstacle);
      drawBike();
      drawParticles();
      drawExhaustTrails();     // ← Novo

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }
    }

    function gameLoop() {
      update(); draw();
      requestAnimationFrame(gameLoop);
    }

    function restartGame() {
      bikeSpeed = 7; score = 0; level = 1; bikeY = 355; velocityY = 0;
      obstacles = []; particles = []; exhaustTrails = [];
      gameTime = 0; timeOfDay = 0; gameOver = false;
      lastObstacle = Date.now();
      scoreEl.textContent = "0"; levelEl.textContent = "Nível 1";
      restartScreen.style.display = "none";
    }

    document.addEventListener("keydown", e => { if (gameOver && e.key.toLowerCase() === "r") restartGame(); });

    gameLoop();
  </script>
</body>
</html>
